<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LCB Dashboard</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LCB" />
  <style>
    :root {
      --bg:       #0a0a12;
      --card:     #13131f;
      --card2:    #1a1a2a;
      --border:   #23233a;
      --gold:     #f5c518;
      --gold-dim: #c9a20044;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --ok:       #10b981;
      --warn:     #f59e0b;
      --err:      #ef4444;
      --blue:     #3b82f6;
      --r:        12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: contain;
    }
    #root { min-height: 100%; }

    /* ── App shell ── */
    .app { max-width: 480px; margin: 0 auto; padding-bottom: 40px; }

    /* ── Header ── */
    .header {
      background: linear-gradient(180deg, #0f0f20 0%, #0a0a12 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px env(safe-area-inset-top, 0);
      position: sticky; top: 0; z-index: 100;
    }
    .header-row { display: flex; justify-content: space-between; align-items: center; }
    .header-brand { display: flex; align-items: center; gap: 8px; }
    .header-note { font-size: 20px; }
    .header-title { font-size: 18px; font-weight: 700; color: var(--gold); letter-spacing: 0.3px; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .refresh-btn {
      background: rgba(245,197,24,.08);
      border: 1px solid rgba(245,197,24,.2);
      border-radius: 8px; color: var(--gold);
      padding: 6px 14px; font-size: 13px; cursor: pointer;
      transition: opacity .15s;
    }
    .refresh-btn:active { opacity: .6; }
    .refresh-btn:disabled { opacity: .4; cursor: default; }
    .spin { display: inline-block; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Sections ── */
    .section { padding: 14px 14px 0; }
    .section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.4px; color: var(--muted); margin-bottom: 10px;
    }

    /* ── KPI top row ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 8px; }
    .kpi-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px 8px; text-align: center;
    }
    .kpi-emoji { font-size: 18px; margin-bottom: 4px; }
    .kpi-val { font-size: 24px; font-weight: 800; color: var(--gold); line-height: 1; }
    .kpi-lbl { font-size: 10px; color: var(--muted); margin-top: 4px; }

    /* ── KPI secondary ── */
    .kpi-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .kpi-mini {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 10px;
    }
    .kpi-mini-val { font-size: 18px; font-weight: 700; }
    .kpi-mini-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* ── Funnel ── */
    .funnel-wrap {
      display: flex; overflow-x: auto; gap: 0; padding: 2px 0 10px;
      scrollbar-width: none;
    }
    .funnel-wrap::-webkit-scrollbar { display: none; }
    .funnel-step { display: flex; align-items: center; flex-shrink: 0; }
    .funnel-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 10px 12px; text-align: center; min-width: 76px;
    }
    .funnel-num { font-size: 22px; font-weight: 800; color: var(--gold); }
    .funnel-name { font-size: 10px; color: var(--muted); margin-top: 2px; white-space: nowrap; }
    .funnel-pct { font-size: 9px; color: var(--ok); margin-top: 2px; }
    .funnel-arr { color: var(--muted); font-size: 14px; padding: 0 3px; flex-shrink: 0; }

    /* ── Orders ── */
    .orders-list { display: flex; flex-direction: column; gap: 8px; }
    .order-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px 14px;
      display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
    }
    .order-info { flex: 1; min-width: 0; }
    .order-client { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .order-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .badge {
      font-size: 10px; font-weight: 700; padding: 3px 9px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .badge-new  { background: rgba(59,130,246,.15); color: #60a5fa; }
    .badge-wip  { background: rgba(16,185,129,.15);  color: #34d399; }
    .badge-done { background: rgba(245,197,24,.15);  color: var(--gold); }
    .badge-no   { background: rgba(239,68,68,.15);   color: #f87171; }
    .badge-gray { background: rgba(100,116,139,.15); color: var(--muted); }

    /* ── Process status ── */
    .status-list { display: flex; flex-direction: column; gap: 6px; }
    .status-row {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-ok   { background: var(--ok);   box-shadow: 0 0 6px var(--ok); }
    .dot-warn { background: var(--warn); }
    .dot-err  { background: var(--err);  }
    .dot-unk  { background: var(--muted); }
    .status-name { flex: 1; font-size: 13px; }
    .status-age  { font-size: 11px; color: var(--muted); }

    /* ── Followups ── */
    .followup-list { display: flex; flex-direction: column; gap: 6px; }

    /* ── Scan status ── */
    .scan-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px; margin-top: 8px;
    }
    .scan-card-active { border-color: var(--gold); }
    .scan-card-permission { border-color: var(--err); animation: pulse-err 1.5s ease infinite; }
    .scan-card-error { border-color: var(--err); }
    .scan-card-done { border-color: var(--ok); }
    .scan-progress-bar {
      height: 6px; border-radius: 3px; background: var(--card2);
      margin: 10px 0 8px; overflow: hidden;
    }
    .scan-progress-fill {
      height: 100%; border-radius: 3px; background: var(--gold);
      transition: width .4s ease;
    }
    .scan-result-item {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; margin-top: 6px;
      font-size: 12px; line-height: 1.4;
    }
    .followup-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .followup-left { min-width: 0; }
    .followup-user { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .followup-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .chip {
      font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 12px; flex-shrink: 0; white-space: nowrap;
    }
    .chip-noreply    { background: rgba(100,116,139,.15); color: var(--muted); }
    .chip-interested { background: rgba(245,197,24,.15);  color: var(--gold); }
    .chip-customer   { background: rgba(16,185,129,.15);  color: var(--ok); }
    .chip-declined   { background: rgba(239,68,68,.15);   color: #f87171; }

    /* ── Overdue order alert ── */
    @keyframes pulse-overdue {
      0%, 100% { border-color: rgba(239,68,68,.55); box-shadow: 0 0 8px rgba(239,68,68,.25); }
      50% { border-color: rgba(239,68,68,1); box-shadow: 0 0 18px rgba(239,68,68,.55); }
    }
    .order-card-overdue {
      animation: pulse-overdue 1.6s ease infinite;
      border-color: rgba(239,68,68,.55) !important;
      background: rgba(239,68,68,.05) !important;
    }

    /* ── Loading skeleton ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skel {
      background: linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%);
      background-size: 400px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--r);
    }

    /* ── Error ── */
    .err-box {
      background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25);
      border-radius: var(--r); padding: 14px; margin: 14px;
      font-size: 13px; color: #f87171; line-height: 1.5;
    }
    .err-box small { color: var(--muted); display: block; margin-top: 6px; }

    /* ── Offline pill ── */
    .offline-pill {
      background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3);
      border-radius: 20px; padding: 3px 10px; font-size: 11px; color: #f87171;
      display: inline-block; margin-left: 8px;
    }

    /* ── Connection status ── */
    .conn-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .conn-dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
    }
    .conn-dot-ok    { background: var(--ok);   box-shadow: 0 0 8px var(--ok); }
    .conn-dot-err   { background: var(--err);  box-shadow: 0 0 8px var(--err); animation: pulse-err 1.5s ease infinite; }
    .conn-dot-unk   { background: var(--muted); }
    @keyframes pulse-err {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .conn-info { flex: 1; }
    .conn-label { font-size: 13px; font-weight: 600; }
    .conn-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .conn-sessions { display: flex; gap: 8px; margin-top: 8px; }
    .conn-session-chip {
      font-size: 10px; padding: 2px 8px; border-radius: 10px;
      display: flex; align-items: center; gap: 4px;
    }
    .conn-chip-ok  { background: rgba(16,185,129,.12); color: var(--ok); }
    .conn-chip-err { background: rgba(239,68,68,.12); color: #f87171; }
    .conn-chip-unk { background: rgba(100,116,139,.12); color: var(--muted); }

    /* ── Action buttons ── */
    .action-btns { display: flex; gap: 8px; margin: 4px 16px 0; }
    .action-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 10px 8px;
      color: var(--text); font-size: 12px; font-weight: 600;
      text-decoration: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .action-btn:active { background: var(--card2); }
    .action-btn-restart { border-color: rgba(16,185,129,.3); }
    .action-btn-restart:active { background: rgba(16,185,129,.08); }
    .action-btn-status { border-color: rgba(59,130,246,.3); }
    .action-btn-status:active { background: rgba(59,130,246,.08); }

    /* ── Empty state ── */
    .empty { text-align: center; color: var(--muted); padding: 20px 0; font-size: 13px; }

    /* ── TG Leads button ── */
    .tg-leads-btn {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px 14px; width: 100%;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .tg-leads-btn:active { background: var(--card2); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.72);
      display: flex; align-items: flex-end;
      animation: fadeIn .18s ease;
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .modal-sheet {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px 20px 0 0; width: 100%; max-width: 480px;
      margin: 0 auto; padding: 12px 16px 36px;
      animation: slideUp .22s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(50px); opacity:.5; }
      to   { transform: translateY(0);    opacity:1; }
    }
    .modal-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 0 auto 12px;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .modal-close {
      background: none; border: none; color: var(--muted);
      font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1;
    }

    /* ── Period tabs ── */
    .period-tabs {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 6px;
      margin-bottom: 18px;
    }
    .period-tab {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted);
      padding: 8px 4px; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all .15s;
    }
    .period-tab.active {
      background: rgba(245,197,24,.1); border-color: rgba(245,197,24,.35);
      color: var(--gold);
    }

    /* ── TG Funnel in modal ── */
    .tg-funnel-list { display: flex; flex-direction: column; gap: 14px; }
    .tg-funnel-item-header {
      display: flex; justify-content: space-between; margin-bottom: 6px;
    }
    .tg-funnel-item-label { font-size: 12px; color: var(--muted); }
    .tg-funnel-item-conv  { font-size: 11px; color: var(--ok); font-weight: 600; }
    .tg-funnel-bar-track  {
      background: var(--card2); border-radius: 8px; height: 44px; overflow: hidden;
    }
    .tg-funnel-bar-fill {
      height: 100%; border-radius: 8px; min-width: 44px;
      display: flex; align-items: center; padding-left: 14px;
      transition: width .35s ease;
    }
    .tg-funnel-bar-num { font-size: 20px; font-weight: 800; color: #fff; }
    .tg-earned-row {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .tg-earned-label { font-size: 13px; color: var(--muted); }
    .tg-earned-val { font-size: 22px; font-weight: 800; color: var(--ok); }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// ── Config ───────────────────────────────────────────────────────────────────
const SHEET_ID    = '1egw7DYnajhLfGcpxqHcjSvN_-WXDDkUZDVvKUFZyrWs';
const REFRESH_MS  = 5 * 60 * 1000;  // 5 min

// ── Google Sheets gviz parser ─────────────────────────────────────────────────
function parseGviz(text) {
  try {
    const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)\s*;?\s*$/);
    if (!m) throw new Error('No gviz wrapper');
    const obj = JSON.parse(m[1]);
    if (!obj.table) return [];
    const { cols, rows } = obj.table;
    const headers = cols.map(c => c.label || c.id || '');
    return (rows || []).map(row =>
      Object.fromEntries((row.c || []).map((cell, i) => [headers[i], cell?.v ?? null]))
    );
  } catch (e) {
    console.error('[parseGviz]', e.message);
    return [];
  }
}

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(sheetName)}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status} для листа «${sheetName}»`);
  return parseGviz(await resp.text());
}

// ── Data processing ───────────────────────────────────────────────────────────
function processRows(rows) {
  const kpi      = {};
  const funnel   = [];
  const status   = [];
  const followups = [];
  const orders   = [];
  const refused  = { total: 0, recent: [] };
  const attention = { total: 0, requires_user: 0, today: 0, overdue: 0, items: [] };
  const refusalCategories = {};  // { low_budget: 15, format_mismatch: 1, ... }
  const channels = {};  // { TG: 91, VK: 5, ... }
  const tgFunnel = {};  // { day: {sent,leads,paid,earned}, week: {…}, … }
  const connection = { status: 'unknown', lastCheck: null, sessions: {} };
  const scan = { status: 'idle', progress: 0, message: '', results: [], chatsChecked: [], updated: '' };

  for (const row of rows) {
    if (!row.key) continue;
    const section = row.section;
    if (section === 'KPI')     kpi[row.key]    = row.value;
    if (section === 'Funnel')  funnel.push({ key: row.key, n: Number(row.value) || 0, label: row.label });
    if (section === 'Status') {
      const parts = (row.value || '').split('|');
      status.push({ key: row.key, val: parts[0], reason: parts[1] || '', action: parts[2] || '', label: row.label });
    }
    if (section === 'Followup') {
      try { followups.push(JSON.parse(row.value)); } catch { followups.push({ user: row.label }); }
    }
    if (section === 'Order') {
      try { orders.push(JSON.parse(row.value)); } catch { /* skip */ }
    }
    if (section === 'Refused') {
      if (row.key === 'refused_total') {
        refused.total = Number(row.value) || 0;
        kpi.refused_total = row.value;  // продублировать в KPI — для мини-плитки
      } else if (row.key?.startsWith('refused_')) {
        try { refused.recent.push(JSON.parse(row.value)); } catch { /* skip */ }
      }
    }
    if (section === 'Attention') {
      if (row.key === 'attention_total')    attention.total = Number(row.value) || 0;
      if (row.key === 'attention_user')     attention.requires_user = Number(row.value) || 0;
      if (row.key === 'attention_today')    attention.today = Number(row.value) || 0;
      if (row.key === 'attention_overdue')  attention.overdue = Number(row.value) || 0;
      if (row.key?.match(/^attention_\d+$/)) {
        try { attention.items.push(JSON.parse(row.value)); } catch { /* skip */ }
      }
    }
    if (section === 'RefusalCategory' && row.key?.startsWith('refcat_')) {
      const cat = row.key.replace('refcat_', '');
      refusalCategories[cat] = Number(row.value) || 0;
    }
    if (section === 'Channel' && row.key?.startsWith('channel_')) {
      const ch = row.key.replace('channel_', '');
      channels[ch] = Number(row.value) || 0;
    }
    if (section === 'TGFunnel') {
      const m = (row.key || '').match(/^tg_funnel_(day|week|month|year)_(sent|leads|paid|earned)$/);
      if (m) {
        const [, period, metric] = m;
        if (!tgFunnel[period]) tgFunnel[period] = {};
        tgFunnel[period][metric] = Number(row.value) || 0;
      }
    }
    if (section === 'Scan') {
      if (row.key === 'scan_status') scan.status = row.value || 'idle';
      if (row.key === 'scan_progress') scan.progress = Number(row.value) || 0;
      if (row.key === 'scan_message') scan.message = row.value || '';
      if (row.key === 'scan_updated') scan.updated = row.value || '';
      if (row.key === 'scan_results') {
        try { scan.results = JSON.parse(row.value); } catch { scan.results = []; }
      }
      if (row.key === 'scan_chats_checked') {
        try { scan.chatsChecked = JSON.parse(row.value); } catch { scan.chatsChecked = []; }
      }
    }
    if (section === 'Connection') {
      if (row.key === 'conn_status') {
        const [st, reason] = (row.value || '').split('|');
        connection.status = st;
        connection.reason = reason || '';
      } else if (row.key === 'conn_last_check') {
        connection.lastCheck = row.value;
      } else if (row.key?.startsWith('conn_')) {
        const sessName = row.label || row.key.replace('conn_', '');
        const [st, reason] = (row.value || '').split('|');
        connection.sessions[sessName] = st;
        if (!connection.sessionReasons) connection.sessionReasons = {};
        if (reason) connection.sessionReasons[sessName] = reason;
      }
    }
  }
  return { kpi, funnel, status, followups, orders, refused, attention, refusalCategories, channels, tgFunnel, connection, scan };
}

// ── Status helpers ────────────────────────────────────────────────────────────
function dotClass(val) {
  if (!val || val === 'missing' || val.startsWith('stale')) return 'dot-warn';
  if (val.startsWith('error')) return 'dot-err';
  if (val.startsWith('ok')) return 'dot-ok';
  return 'dot-unk';
}

function orderBadge(status) {
  const s = (status || '').toLowerCase();
  if (s.includes('нов') || s === 'new')  return ['badge-new',  status];
  if (s.includes('работ') || s === 'wip') return ['badge-wip', status];
  if (s.includes('подтверж') || s.includes('confirm') || s.includes('готов'))
    return ['badge-done', status];
  if (s.includes('отказ') || s === 'declined') return ['badge-no', status];
  return ['badge-gray', status || '—'];
}

function convChip(status) {
  const s = (status || '').toLowerCase();
  if (s === 'customer') return ['chip-customer', 'Клиент 🎉'];
  if (s === 'interested') return ['chip-interested', 'Интерес'];
  if (s === 'no_reply') return ['chip-noreply', 'Без ответа'];
  if (s === 'declined') return ['chip-declined', 'Отказ'];
  return ['chip-noreply', s || '—'];
}

function fmtDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso.length === 10 ? iso + 'T00:00:00' : iso);
    return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
  } catch { return iso.slice(0, 10); }
}

// ── Order overdue check ───────────────────────────────────────────────────────
function isOverdue(order) {
  const s = (order.status || '').toLowerCase();
  const waitKw = ['ждёт', 'ждет', 'обещал', 'pending', 'ожидает'];
  if (!waitKw.some(kw => s.includes(kw))) return false;
  const dateStr = order.date_posted || order.date_event;
  if (!dateStr) return false;
  try {
    let d;
    if (/^\d{2}\.\d{2}\.\d{4}/.test(dateStr)) {
      const [day, month, year] = dateStr.split('.');
      d = new Date(Number(year), Number(month) - 1, Number(day));
    } else {
      d = new Date(dateStr);
    }
    return (Date.now() - d.getTime()) > 2 * 24 * 60 * 60 * 1000;
  } catch { return false; }
}

function ConnectionStatus({ connection }) {
  const st = connection.status || 'unknown';
  const dotCls = st === 'ok' ? 'conn-dot-ok' : st === 'error' ? 'conn-dot-err' : 'conn-dot-unk';
  const label  = st === 'ok' ? 'Подключено' : st === 'error' ? 'Соединение потеряно' : 'Нет данных';
  const labelColor = st === 'ok' ? 'var(--ok)' : st === 'error' ? '#f87171' : 'var(--muted)';

  const lastCheck = connection.lastCheck;
  let timeAgo = '';
  if (lastCheck && lastCheck !== '—') {
    try {
      const d = new Date(lastCheck);
      const mins = Math.round((Date.now() - d.getTime()) / 60000);
      if (mins < 1) timeAgo = 'только что';
      else if (mins < 60) timeAgo = mins + ' мин назад';
      else if (mins < 1440) timeAgo = Math.round(mins / 60) + ' ч назад';
      else timeAgo = Math.round(mins / 1440) + ' д назад';
    } catch { timeAgo = lastCheck; }
  }

  // Аккаунт показываем ОДИН раз: берём из connection.reason (общий) либо из
  // первого session reason. Цвет — синий при ok, красный при error.
  const sessionReasons = connection.sessionReasons || {};
  const firstSessionReason = Object.values(sessionReasons).find(Boolean) || '';
  const accountInfo = connection.reason || firstSessionReason;
  const accountColor = st === 'ok' ? '#60a5fa' : '#f87171';

  return (
    <div className="section">
      <div className="section-title">Telegram соединение</div>
      <div className="conn-card">
        <div className={`conn-dot ${dotCls}`} />
        <div className="conn-info">
          <div className="conn-label" style={{color: labelColor}}>{label}</div>
          {accountInfo && (
            <div style={{fontSize:12,color:accountColor,marginTop:2,fontWeight:500}}>
              {accountInfo}
            </div>
          )}
          {timeAgo && <div className="conn-sub">Проверено: {timeAgo}</div>}
        </div>
      </div>
    </div>
  );
}

function ScanStatus({ scan }) {
  if (!scan || scan.status === 'idle') return null;

  const isActive = scan.status === 'scanning';
  const needsPerm = scan.status === 'needs_permission';
  const isDone = scan.status === 'done';
  const isError = scan.status === 'error';

  const cardClass = needsPerm ? 'scan-card scan-card-permission'
    : isError ? 'scan-card scan-card-error'
    : isDone ? 'scan-card scan-card-done'
    : isActive ? 'scan-card scan-card-active'
    : 'scan-card';

  const statusEmoji = needsPerm ? '⚠️' : isError ? '❌' : isDone ? '✅' : '🔍';
  const statusLabel = needsPerm ? 'Требуется разрешение'
    : isError ? 'Ошибка'
    : isDone ? 'Сканирование завершено'
    : 'Сканирование...';

  const statusColor = needsPerm || isError ? '#f87171' : isDone ? 'var(--ok)' : 'var(--gold)';

  let timeAgo = '';
  if (scan.updated) {
    try {
      const d = new Date(scan.updated);
      const mins = Math.round((Date.now() - d.getTime()) / 60000);
      if (mins < 1) timeAgo = 'только что';
      else if (mins < 60) timeAgo = mins + ' мин назад';
      else timeAgo = Math.round(mins / 60) + ' ч назад';
    } catch { timeAgo = ''; }
  }

  return (
    <div className="section" style={{ marginTop: 14 }}>
      <div className="section-title">TG Сканирование</div>
      <div className={cardClass}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:14,fontWeight:700,color:statusColor}}>
            {statusEmoji} {statusLabel}
          </div>
          {timeAgo && <div style={{fontSize:10,color:'var(--muted)'}}>{timeAgo}</div>}
        </div>

        {scan.message && (
          <div style={{fontSize:12,color:'var(--text)',marginTop:6,lineHeight:1.4}}>{scan.message}</div>
        )}

        {isActive && (
          <div className="scan-progress-bar">
            <div className="scan-progress-fill" style={{width: scan.progress + '%'}} />
          </div>
        )}
        {isActive && (
          <div style={{fontSize:11,color:'var(--muted)',textAlign:'right'}}>{scan.progress}%</div>
        )}

        {scan.chatsChecked && scan.chatsChecked.length > 0 && (() => {
          const totalPosts = scan.chatsChecked.reduce((a, c) => a + (Number(c.posts) || 0), 0);
          return (
            <div style={{marginTop:8,padding:'6px 8px',background:'rgba(255,255,255,0.03)',borderRadius:6,fontSize:10,color:'var(--muted)'}}>
              <div style={{fontWeight:700,textTransform:'uppercase',letterSpacing:'1.2px',marginBottom:4}}>
                Проверено: {scan.chatsChecked.length} {scan.chatsChecked.length === 1 ? 'чат' : 'чатов'} · {totalPosts} постов
              </div>
              {scan.chatsChecked.map((c, i) => (
                <div key={i} style={{display:'flex',gap:6,flexWrap:'wrap',lineHeight:1.5}}>
                  <span style={{color:'var(--text)'}}>{c.chat || '—'}</span>
                  <span>· {c.posts || 0} постов</span>
                  {c.period_from && c.period_to && <span>· {c.period_from}–{c.period_to}</span>}
                </div>
              ))}
            </div>
          );
        })()}

        {scan.results && scan.results.length > 0 && (
          <div style={{marginTop:8}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'1.2px',color:'var(--muted)',marginBottom:4}}>
              Найдено заявок: {scan.results.length}
            </div>
            {scan.results.map((r, i) => {
              // Build a Telegram Web link that opens the chat directly.
              // Priority: explicit post_link > @username (contact/link) > chat-source @username > source chat name map.
              const chatNameMap = {
                'Event Family': 'EventFamily',
                'EventFamily': 'EventFamily',
                'Event Russia': 'Event_Russian',
                'Event_Russian': 'Event_Russian',
                'Event Area': 'event_area',
                'event_area': 'event_area',
                'Event People': 'eventori',
                'eventori': 'eventori',
                'Event hunter': 'mskeventjob',
                'mskeventjob': 'mskeventjob',
                'myeventhunter': 'myeventhunter',
                'Bigfinger': 'bigfingerchat',
                'bigfingerchat': 'bigfingerchat',
                'eventchatrussia': 'eventchatrussia',
                'Event Мероприятия': 'eventchatrussia',
              };
              const unameMatch = (r.contact || '').match(/@([A-Za-z0-9_]+)/)
                || (r.link || '').match(/t\.me\/([A-Za-z0-9_]+)/)
                || (r.chat || '').match(/@([A-Za-z0-9_]+)/);
              let uname = unameMatch && unameMatch[1];
              // Fallback: use chat-name map when contact is "в ЛС" and link empty
              if (!uname && r.chat) {
                for (const [k, v] of Object.entries(chatNameMap)) {
                  if (r.chat.toLowerCase().includes(k.toLowerCase())) { uname = v; break; }
                }
              }
              // tg://resolve?domain=X opens Telegram Desktop DIRECTLY to the DM with that user.
              // Fallback: https://t.me/X for leads without explicit uname (Telegram Desktop handles it too).
              const tgLink = uname
                ? `tg://resolve?domain=${uname}`
                : r.post_link
                  ? r.post_link
                  : null;
              // If we fell back to source chat, adjust label
              const contactIsDM = (r.contact || '').trim() === 'в ЛС';
              const linkLabel = contactIsDM && uname && !unameMatch
                ? `→ чат @${uname}`
                : null;
              return (
              <div key={i} className="scan-result-item"
                onClick={() => tgLink && window.open(tgLink, '_blank')}
                style={{cursor: tgLink ? 'pointer' : 'default'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <span style={{color:'var(--gold)',marginRight:6}}>•</span>
                    {tgLink
                      ? <a href={tgLink} target="_blank" rel="noopener" style={{color:'var(--blue)',textDecoration:'none',fontWeight:700}}>{r.who || '—'}</a>
                      : <strong>{r.who || '—'}</strong>
                    }
                    {r.contact && (tgLink && uname

function TGFunnelModal({ tgFunnel, onClose }) {
  const [period, setPeriod] = useState('week');
  const periods = [
    { key: 'day',   label: 'День' },
    { key: 'week',  label: 'Неделя' },
    { key: 'month', label: 'Месяц' },
    { key: 'year',  label: 'Год' },
  ];
  const cur    = tgFunnel[period] || { sent: 0, leads: 0, paid: 0, earned: 0 };
  const maxVal = Math.max(cur.sent || 1, 1);
  const steps  = [
    { key: 'sent',  label: 'Отправлено ответов',  val: cur.sent,  color: '#3b82f6' },
    { key: 'leads', label: 'Лиды (Customer TG)',  val: cur.leads, color: '#f5c518' },
    { key: 'paid',  label: 'Оплатили',            val: cur.paid,  color: '#10b981' },
  ];
  const hasData = Object.keys(tgFunnel).length > 0;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()}>
        <div className="modal-handle" />
        <div className="modal-header">
          <div className="modal-title">TG Воронка</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="period-tabs">
          {periods.map(p => (
            <button
              key={p.key}
              className={'period-tab' + (period === p.key ? ' active' : '')}
              onClick={() => setPeriod(p.key)}
            >{p.label}</button>
          ))}
        </div>
        <div className="tg-funnel-list">
          {steps.map((step, i) => {
            const prev = steps[i - 1];
            const conv = prev && prev.val > 0
              ? Math.round(step.val / prev.val * 100) + '%'
              : null;
            const barW = Math.max(8, Math.round(step.val / maxVal * 100));
            return (
              <div key={step.key} className="tg-funnel-item">
                <div className="tg-funnel-item-header">
                  <span className="tg-funnel-item-label">{step.label}</span>
                  {conv && i > 0 && <span className="tg-funnel-item-conv">{conv}</span>}
                </div>
                <div className="tg-funnel-bar-track">
                  <div
                    className="tg-funnel-bar-fill"
                    style={{ width: barW + '%', background: step.color }}
                  >
                    <span className="tg-funnel-bar-num">{step.val}</span>
                  </div>
                </div>
              </div>
            );
          })}
          <div className="tg-earned-row">
            <span className="tg-earned-label">Заработано</span>
            <span className="tg-earned-val">
              {cur.earned > 0 ? cur.earned.toLocaleString('ru-RU') + '\u00a0₽' : '—'}

        </div>
        {!hasData && (
          <div style={{marginTop:14, fontSize:11, color:'var(--muted)', textAlign:'center'}}>
            Запустите sync_dashboard_data.py для обновления данных

  );

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [rows,      setRows]      = useState(null);
  const [loading,   setLoading]   = useState(true);
  const [refreshing,setRefreshing]= useState(false);
  const [error,     setError]     = useState(null);
  const [updatedAt, setUpdatedAt] = useState(null);
  const [offline,   setOffline]   = useState(!navigator.onLine);
  const [showTGModal, setShowTGModal] = useState(false);
  const [showProcess, setShowProcess] = useState(null);
  const [activeTab, setActiveTab] = useState(() => {
    try { return localStorage.getItem('lcb_tab') || 'overview'; } catch { return 'overview'; }
  });
  useEffect(() => {
    try { localStorage.setItem('lcb_tab', activeTab); } catch {}
  }, [activeTab]);

  useEffect(() => {
    const on  = () => setOffline(false);
    const off = () => setOffline(true);
    window.addEventListener('online',  on);
    window.addEventListener('offline', off);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  }, []);

  const load = useCallback(async (isRefresh = false) => {
    if (isRefresh) setRefreshing(true);
    try {
      const data = await fetchSheet('Dashboard');
      setRows(data);
      setError(null);
      setUpdatedAt(new Date());
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
      setRefreshing(false);
    }
  }, []);

  useEffect(() => {
    load();
    const t = setInterval(() => load(true), REFRESH_MS);
    return () => clearInterval(t);
  }, [load]);

  const data = useMemo(() => rows ? processRows(rows) : null, [rows]);

  // Fast polling (30s) when scan is active
  useEffect(() => {
    if (!data || !data.scan) return;
    const active = data.scan.status === 'scanning' || data.scan.status === 'needs_permission';
    if (!active) return;
    const fast = setInterval(() => load(true), 30000);
    return () => clearInterval(fast);
  }, [data?.scan?.status, load]);

  const timeStr = updatedAt
    ? updatedAt.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' })
    : null;

  return (
    <div className="app">
      {/* Header */}
      <div className="header">
        <div className="header-row">
          <div className="header-brand">
            <span className="header-note">🎶</span>
            <div>
              <div className="header-title">
                LCB Dashboard
                {offline && <span className="offline-pill">offline</span>}
              </div>
              {timeStr && <div className="header-sub">Обновлено: {timeStr}</div>}
            </div>
          </div>
          <button
            className="refresh-btn"
            onClick={() => load(true)}
            disabled={refreshing}
          >
            <span className={refreshing ? 'spin' : ''}>↻</span>
          </button>
        </div>
      </div>

      {/* Error */}
      {error && (
        <div className="err-box">
          ⚠️ {error}
          <small>
            Убедитесь что Google Sheets доступна публично.<br/>
            Запустите: <code>python3 sync_dashboard_data.py</code>
          </small>
        </div>
      )}

      {/* Loading skeleton */}
      {loading && !rows && <SkeletonCards />}

      {/* Content */}
      {data && (
        <>
          <ConnectionStatus connection={data.connection} />
          <TabBar
            activeTab={activeTab}
            setActiveTab={setActiveTab}
            attentionCount={data.attention?.total || 0}
            refusalCount={Object.values(data.refusalCategories || {}).reduce((a,b) => a+b, 0)}
          />

          {activeTab === 'overview' && (
            <>
              <ActionButtons />
              <KPISection kpi={data.kpi} />
              <div className="section" style={{ marginTop: 8 }}>
                <TGLeadsButton
                  onClick={() => setShowTGModal(true)}
                  tgWeek={data.tgFunnel?.week}
                />
              </div>
              <FunnelSection funnel={data.funnel} />
              <OrdersSection orders={data.orders} />
              <ScanStatus scan={data.scan} />
              <StatusSection status={data.status} onProcessClick={setShowProcess} />
              <FollowupsSection followups={data.followups} />
            </>
          )}

          {activeTab === 'attention' && (
            <AttentionSection attention={data.attention || {total:0, items:[]}} />
          )}

          {activeTab === 'refusals' && (
            <RefusalsSection refused={data.refused} categories={data.refusalCategories || {}} />
          )}

          {activeTab === 'broadcasts' && (
            <BroadcastsSection categories={data.refusalCategories || {}} />
          )}

          {showTGModal && (
            <TGFunnelModal
              tgFunnel={data.tgFunnel || {}}
              onClose={() => setShowTGModal(false)}
            />
          )}
          {showProcess && (
            <ProcessRulesModal
              processKey={showProcess}
              onClose={() => setShowProcess(null)}
            />
          )}
        </>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

<script>
// Service Worker registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('[SW] registered', r.scope))
      .catch(e => console.log('[SW] failed', e));
  });
}
</script>
</body>
</html>

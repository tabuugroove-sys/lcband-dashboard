function TGFunnelModal({ tgFunnel, onClose }) {
  const [period, setPeriod] = useState('week');
  const periods = [
    { key: 'day',   label: 'День' },
    { key: 'week',  label: 'Неделя' },
    { key: 'month', label: 'Месяц' },
    { key: 'year',  label: 'Год' },
  ];
  const cur    = tgFunnel[period] || { sent: 0, leads: 0, paid: 0, earned: 0 };
  const maxVal = Math.max(cur.sent || 1, 1);
  const steps  = [
    { key: 'sent',  label: 'Отправлено ответов',  val: cur.sent,  color: '#3b82f6' },
    { key: 'leads', label: 'Лиды (Customer TG)',  val: cur.leads, color: '#f5c518' },
    { key: 'paid',  label: 'Оплатили',            val: cur.paid,  color: '#10b981' },
  ];
  const hasData = Object.keys(tgFunnel).length > 0;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()}>
        <div className="modal-handle" />
        <div className="modal-header">
          <div className="modal-title">TG Воронка</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="period-tabs">
          {periods.map(p => (
            <button
              key={p.key}
              className={'period-tab' + (period === p.key ? ' active' : '')}
              onClick={() => setPeriod(p.key)}
            >{p.label}</button>
          ))}
        </div>
        <div className="tg-funnel-list">
          {steps.map((step, i) => {
            const prev = steps[i - 1];
            const conv = prev && prev.val > 0
              ? Math.round(step.val / prev.val * 100) + '%'
              : null;
            const barW = Math.max(8, Math.round(step.val / maxVal * 100));
            return (
              <div key={step.key} className="tg-funnel-item">
                <div className="tg-funnel-item-header">
                  <span className="tg-funnel-item-label">{step.label}</span>
                  {conv && i > 0 && <span className="tg-funnel-item-conv">{conv}</span>}
                </div>
                <div className="tg-funnel-bar-track">
                  <div
                    className="tg-funnel-bar-fill"
                    style={{ width: barW + '%', background: step.color }}
                  >
                    <span className="tg-funnel-bar-num">{step.val}</span>
                  </div>
                </div>
              </div>
            );
          })}
          <div className="tg-earned-row">
            <span className="tg-earned-label">Заработано</span>
            <span className="tg-earned-val">
              {cur.earned > 0 ? cur.earned.toLocaleString('ru-RU') + '\u00a0₽' : '—'}
            </span>
          </div>
        </div>
        {!hasData && (
          <div style={{marginTop:14, fontSize:11, color:'var(--muted)', textAlign:'center'}}>
            Запустите sync_dashboard_data.py для обновления данных
          </div>
        )}
      </div>
    </div>
  );
}

            color: activeTab === t.id ? 'white' : 'var(--text)',
            fontWeight: activeTab === t.id ? 700 : 500,
            fontSize: 12.5,
            cursor: 'pointer',
            whiteSpace: 'nowrap',
            display: 'flex',
            alignItems: 'center',
            gap: 5,
            flexShrink: 0,
          }}>
          <span>{t.emoji}</span>
          <span>{t.label}</span>
          {t.badge > 0 && (
            <span style={{
              background: activeTab === t.id ? 'rgba(255,255,255,0.25)' : '#f87171',
              color: 'white',
              padding: '2px 6px',
              borderRadius: 10,
              fontSize: 10.5,
              fontWeight: 700,
              lineHeight: 1,
            }}>{t.badge}</span>
          )}
        </button>
      ))}
    </div>
  );
}

function SessionSection({ session }) {
  const chatCtx = React.useContext(ChatContext);
  const hoverTimer = React.useRef(null);
  const items = session?.items || [];
  const counts = session?.counts || {};
  const sessions = session?.sessions || [];
  const current = session?.session || '';

  if (!items.length) {
    return (
      <div className="section" style={{ marginTop: 14 }}>
        <div className="section-title">🆕 Новые заказы</div>
        <div className="empty" style={{padding:20, textAlign:'center', color:'var(--muted)'}}>
          За текущую сессию ни одного обработанного лида.
        </div>
      </div>
    );

    awaiting_approve:   { bg: 'rgba(245,197,24,0.15)', fg: '#f5c518' },
    awaiting_director:  { bg: 'rgba(245,197,24,0.15)', fg: '#f5c518' },
    awaiting_client:    { bg: 'rgba(59,130,246,0.15)', fg: '#3b82f6' },
    ai_skip:            { bg: 'rgba(239,68,68,0.12)',  fg: '#ef4444' },
    needs_vk_flow:      { bg: 'rgba(239,68,68,0.12)',  fg: '#ef4444' },
    declined:           { bg: 'rgba(239,68,68,0.12)',  fg: '#ef4444' },
    followup:           { bg: 'rgba(168,85,247,0.15)', fg: '#a855f7' },
    probe:              { bg: 'rgba(168,85,247,0.15)', fg: '#a855f7' },

      <div className="section-title" style={{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>

        {counts.sent > 0 && (
          <span style={{background:'rgba(16,185,129,0.15)',color:'#10b981',padding:'3px 8px',borderRadius:10,fontWeight:700}}>

        {counts.awaiting_approve > 0 && (
          <span style={{background:'rgba(245,197,24,0.15)',color:'#f5c518',padding:'3px 8px',borderRadius:10,fontWeight:700}}>
            ⏳ Ждёт approve: {counts.awaiting_approve}
          </span>
        )}
        {counts.awaiting_director > 0 && (
          <span style={{background:'rgba(245,197,24,0.15)',color:'#f5c518',padding:'3px 8px',borderRadius:10,fontWeight:700}}>
            ⏳ Ждёт Вадима: {counts.awaiting_director}
          </span>
        )}
        {counts.ai_skip > 0 && (
          <span style={{background:'rgba(239,68,68,0.12)',color:'#ef4444',padding:'3px 8px',borderRadius:10,fontWeight:700}}>
            ❌ AI-skip: {counts.ai_skip}
          </span>
        )}
        {counts.needs_vk_flow > 0 && (
          <span style={{background:'rgba(239,68,68,0.12)',color:'#ef4444',padding:'3px 8px',borderRadius:10,fontWeight:700}}>
            ❌ VK-flow: {counts.needs_vk_flow}
          </span>
        )}
        {counts.declined > 0 && (
          <span style={{background:'rgba(239,68,68,0.12)',color:'#ef4444',padding:'3px 8px',borderRadius:10,fontWeight:700}}>
            ❌ Отказ: {counts.declined}
          </span>

      <div style={{ overflowX:'auto', margin:'0 -6px' }}>

              <th style={{padding:'8px 6px', borderBottom:'1px solid var(--border)', width:28}}>#</th>
              <th style={{padding:'8px 6px', borderBottom:'1px solid var(--border)'}}>Лид</th>
              <th style={{padding:'8px 6px', borderBottom:'1px solid var(--border)'}}>Event</th>
              <th style={{padding:'8px 6px', borderBottom:'1px solid var(--border)'}}>Статус</th>
              <th style={{padding:'8px 6px', borderBottom:'1px solid var(--border)'}}>Детали</th>
            </tr>
          </thead>

              const uname = it.username || '';
              const canChat = it.channel === 'TG' && !!uname;
              const displayName = it.client || uname || it.contact || '—';
              const onEnter = canChat ? () => {
                clearTimeout(hoverTimer.current);
                hoverTimer.current = setTimeout(() => chatCtx?.openChat({
                  user_id: null, username: uname, client: it.client,
                }), 200);
              } : undefined;
              const onLeave = canChat ? () => clearTimeout(hoverTimer.current) : undefined;

                .filter(Boolean).join(' · ');

                    cursor: canChat ? 'pointer' : 'default',

                      padding:'3px 8px',
                      borderRadius:10,
                      fontSize:11,
                      fontWeight:700,

                      whiteSpace:'nowrap',

                  </td>
                  <td style={{padding:'10px 6px', borderBottom:'1px solid var(--border)', color:'var(--text)', opacity:0.88}}>

                      <div style={{fontSize:10.5, color:'var(--muted)', marginTop:3, fontVariantNumeric:'tabular-nums'}}>

            })}

        </table>
      </div>

      {sessions.length > 1 && (
        <div style={{marginTop:10, fontSize:11, color:'var(--muted)'}}>
          Прошлые сессии: {sessions.slice(1, 6).join(' · ')}
          {sessions.length > 6 ? ` · +${sessions.length - 6}` : ''}
        </div>
      )}
    </div>
  );
}

function AttentionSection({ attention }) {
  const chatCtx = React.useContext(ChatContext);
  const aiCtx = React.useContext(AiTagsContext);
  const hoverTimer = React.useRef(null);
  const [showAll, setShowAll] = useState(false);

  // Лиды с ярлыком decline (уже отказал) и awaiting_client (рано пушить)
  // скрываем из списка по умолчанию — они не требуют твоего времени прямо сейчас.
  const HIDDEN_CATEGORIES = new Set(['decline', 'awaiting_client']);
  const rawItems = attention.items || [];
  const filteredItems = showAll ? rawItems : rawItems.filter(it => {
    const uname = (it.username || '').toLowerCase();
    const tag = uname ? aiCtx.tags[uname] : null;
    if (!tag) return true;                 // нет классификации — оставляем
    return !HIDDEN_CATEGORIES.has(tag.category);
  });
  const hiddenCount = rawItems.length - filteredItems.length;

  if (!rawItems.length) {
    return (
      <div className="section" style={{ marginTop: 14 }}>
        <div className="section-title">🔔 Требуют внимания</div>
        <div className="empty" style={{padding:20, textAlign:'center', color:'var(--muted)'}}>
          ✅ Всё под контролем — ни одного просроченного лида
        </div>
      </div>
    );
  }
  return (
    <div className="section" style={{ marginTop: 14 }}>
      <div className="section-title" style={{ display:'flex', alignItems:'center', gap:10 }}>
        🔥 Горячие
        <span style={{background:'#f87171',color:'white',padding:'2px 8px',borderRadius:10,fontSize:11,fontWeight:700}}>
          {attention.total}
        </span>
      </div>
      <div style={{ display:'flex', gap:8, marginBottom:12, fontSize:12 }}>
        {attention.requires_user > 0 && (
          <div style={{background:'rgba(248,113,113,0.15)',color:'#f87171',padding:'4px 10px',borderRadius:12,fontWeight:700}}>
            🧑 Решение Михаила: {attention.requires_user}
          </div>
        )}
        {attention.overdue > 0 && (
          <div style={{background:'rgba(251,146,60,0.15)',color:'#fb923c',padding:'4px 10px',borderRadius:12,fontWeight:700}}>
            ⏰ Просрочено: {attention.overdue}
          </div>
        )}
        {attention.today > 0 && (
          <div style={{background:'rgba(250,204,21,0.15)',color:'#facc15',padding:'4px 10px',borderRadius:12,fontWeight:700}}>
            📅 На сегодня: {attention.today}
          </div>
        )}
        {hiddenCount > 0 && (
          <button
            onClick={() => setShowAll(v => !v)}
            style={{
              marginLeft:'auto', padding:'4px 10px', fontSize:11, fontWeight:600,
              background:'transparent', color:'var(--muted)',
              border:'1px solid var(--border)', borderRadius:12, cursor:'pointer',
            }}
            title="По умолчанию скрыты карточки с ярлыками ❌ Отказ и ⏳ Ждём ответа — они не требуют действий прямо сейчас"
          >
            {showAll
              ? '🙈 Скрыть отказы/ожидающих'
              : `👁️ Показать все (+${hiddenCount} скрыто)`}
          </button>
        )}
      </div>
      <div className="orders-list">
        {filteredItems.slice(0, 20).map((item, i) => {
          const uname = item.username;
          const tgUrl = uname
            ? `https://t.me/${uname}`
            : (item.contact?.startsWith('http') ? item.contact : '');
          const canChat = item.channel === 'TG' && !!item.username;
          const clientEl = canChat
            ? <span style={{color:'var(--blue)'}}>{item.client || uname}</span>
            : tgUrl
              ? <a href={tgUrl} target="_blank" rel="noopener" style={{color:'var(--blue)',textDecoration:'none'}}>{item.client || uname}</a>
              : (item.client || '—');
          const priorityEmoji = item.requires_user ? '🧑' : item.overdue ? '⏰' : item.today ? '📅' : '';
          const bgTint = item.requires_user
            ? 'rgba(248,113,113,0.08)'
            : item.overdue ? 'rgba(251,146,60,0.08)'
            : 'transparent';
          const openTarget = () => chatCtx?.openChat({
            user_id: null, username: item.username, client: item.client
          });
          const onEnter = canChat ? () => {
            clearTimeout(hoverTimer.current);
            hoverTimer.current = setTimeout(openTarget, 200);
          } : undefined;
          const onLeave = canChat ? () => clearTimeout(hoverTimer.current) : undefined;
          return (
            <div
              key={i}
              className="order-card"
              data-clickable={canChat ? 'true' : undefined}
              style={{background: bgTint}}
              onMouseEnter={onEnter}
              onMouseLeave={onLeave}
              onClick={canChat ? openTarget : undefined}
              title={canChat ? 'Навести — откроет чат' : undefined}
            >
              <div className="order-info">
                <div className="order-client">
                  {priorityEmoji && <span style={{marginRight:6}}>{priorityEmoji}</span>}
                  {clientEl}
                  {(() => {
                    const tag = uname ? aiCtx.tags[uname.toLowerCase()] : null;
                    if (!tag) return null;
                    const meta = AI_TAG_META[tag.category] || AI_TAG_META.unknown;
                    if (!meta || meta.label === '—') return null;
                    // Pill справа от имени — категория
                    return (
                      <span
                        title={`${meta.hint}${tag.reason ? '\n\n' + tag.reason : ''}`}
                        style={{
                          marginLeft: 8,
                          padding: '2px 7px',
                          fontSize: 10,
                          fontWeight: 600,
                          borderRadius: 6,
                          background: meta.color + '22',
                          color: meta.color,
                          border: '1px solid ' + meta.color + '55',
                          whiteSpace: 'nowrap',
                        }}
                      >{meta.label}</span>
                    );
                  })()}
                </div>
                {(() => {
                  const tag = uname ? aiCtx.tags[uname.toLowerCase()] : null;
                  if (!tag) return null;
                  const meta = AI_TAG_META[tag.category] || AI_TAG_META.unknown;
                  const label = tag.status_label || meta.hint;
                  if (!label) return null;
                  return (
                    <div style={{fontSize:12, color:'var(--muted)', marginTop:4, display:'flex', gap:10, alignItems:'center'}}>
                      <span style={{flex:1}}>💡 {label}</span>
                      {meta.action !== '—' && (
                        <span style={{
                          padding:'2px 8px', borderRadius:6, fontSize:10, fontWeight:700,
                          background: meta.color + '22', color: meta.color,
                          border:'1px solid ' + meta.color + '55', whiteSpace:'nowrap',
                        }}>{meta.action}</span>
                      )}
                    </div>
                  );
                })()}
                <div className="order-meta" style={{fontSize:11}}>
                  <span>📋 {item.status}</span>
                  {item.event_date && <span style={{marginLeft:8}}>🎉 {item.event_date}</span>}
                  {item.next_action && <span style={{marginLeft:8}}>➡️ {item.next_action}</span>}
                  {item.channel && <span style={{marginLeft:8,opacity:0.6}}>{item.channel}</span>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function RefusalsSection({ refused, categories }) {
  const REFUSAL_META = {
    low_budget:      { emoji: '💰', label: 'Низкий бюджет',        color: '#fb923c' },
    format_mismatch: { emoji: '🎭', label: 'Не тот формат',         color: '#a78bfa' },
    already_found:  { emoji: '🏃',  label: 'Уже выбрали другого',   color: '#f87171' },
    event_passed:   { emoji: '📅',  label: 'Событие прошло',        color: '#6b7280' },
    ghosting:       { emoji: '👻',  label: 'Не отвечают (7+ дней)', color: '#9ca3af' },
    wrong_service:  { emoji: '🚫',  label: 'Не наш профиль',        color: '#ef4444' },
    region_out:     { emoji: '📍',  label: 'Не наш регион',         color: '#06b6d4' },
    residence:      { emoji: '🏪',  label: 'ТРК / резидент',        color: '#8b5cf6' },
    blocked:        { emoji: '🔒',  label: 'Заблокировал',          color: '#1f2937' },
    unreachable:    { emoji: '👻',  label: 'Удалил/переименовал',   color: '#6b7280' },
    privacy_closed: { emoji: '🔕',  label: 'Закрыт для не-контактов',color: '#94a3b8' },
    unknown:        { emoji: '❓',  label: 'Причина неясна',        color: '#71717a' },
  };
  const total = Object.values(categories).reduce((a,b) => a+b, 0);
  const sorted = Object.entries(categories).sort((a,b) => b[1]-a[1]);
  return (
    <div>
      <div className="section" style={{ marginTop: 14 }}>
        <div className="section-title">❌ Отказы по категориям</div>
        <div style={{padding:'4px 0',color:'var(--muted)',fontSize:12,marginBottom:10}}>
          Всего в архиве: <b style={{color:'var(--text)'}}>{total}</b> · используются для таргетированных рассылок
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(160px, 1fr))',gap:8}}>
          {sorted.map(([cat, n]) => {

// ── Processes (launchd agents) with SLA ──────────────────────────────────────
function ProcessesSection({ agents }) {
  const fmtInterval = (sec) => {
    if (!sec) return 'постоянно';
    if (sec < 60) return `${sec}с`;
    if (sec < 3600) return `${Math.round(sec/60)}м`;
    return `${Math.round(sec/3600)}ч`;
  };
  const fmtMinsAgo = (m) => {
    if (m == null) return '—';
    if (m < 1) return 'только что';
    if (m < 60) return `${m}м назад`;
    if (m < 1440) return `${Math.round(m/60)}ч назад`;
    return `${Math.round(m/1440)}д назад`;
  };
  const stateColor = (st) => {
    if (st === 'running')   return { dot:'#10b981', label:'работает',   bg:'rgba(16,185,129,0.1)' };
    if (st === 'not')       return { dot:'#f5c518', label:'ждёт',       bg:'rgba(245,197,24,0.08)' };
    if (st === 'missing')   return { dot:'#f87171', label:'НЕ В LAUNCHCTL', bg:'rgba(248,113,113,0.15)' };
    if (st === 'error')     return { dot:'#f87171', label:'ошибка',     bg:'rgba(248,113,113,0.15)' };
    return { dot:'#6b7280', label: st || '?', bg:'rgba(107,114,128,0.1)' };
  };
  const slaColor = (sla) => {
    if (sla === 'green')    return '#10b981';
    if (sla === 'yellow')   return '#f5c518';
    if (sla === 'red')      return '#f87171';
    if (sla === 'sleeping') return '#60a5fa';  // синий — штатный сон
    return 'var(--muted)';
  };
  return (
    <div className="section" style={{ marginTop: 14 }}>
      <div className="section-title">🛡️ Процессы (launchd)</div>
      <div style={{display:'flex',gap:16,padding:'4px 0',fontSize:12,color:'var(--muted)',marginBottom:10,flexWrap:'wrap'}}>
        <span>Всего: <b style={{color:'var(--text)'}}>{agents.total}</b></span>
        <span>● <b style={{color:'#10b981'}}>{agents.running}</b> работает</span>
        {agents.missing > 0 && <span>⚠️ <b style={{color:'#f87171'}}>{agents.missing}</b> не в launchctl</span>}
        {agents.staleSla > 0 && <span>⏱️ <b style={{color:'#f5c518'}}>{agents.staleSla}</b> SLA просрочен</span>}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {(agents.items || []).map((a, i) => {
          const sc = stateColor(a.state);
          const okExit = a.last_exit === '0' || a.last_exit === '(never exited)' || !a.last_exit;
          const slaCol = slaColor(a.sla);
          return (
            <div key={i} style={{
              padding:'8px 12px',
              background: sc.bg,
              borderRadius: 8,
              border: `1px solid ${a.sla === 'red' ? '#f87171' : 'var(--border)'}`,
              display: 'flex',
              alignItems: 'center',
              gap: 10,
            }}>
              <span style={{
                width:8,height:8,borderRadius:'50%',
                background: sc.dot,
                boxShadow: a.state === 'running' ? `0 0 6px ${sc.dot}` : 'none',
                flexShrink:0,
              }} />
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                  {a.desc}
                </div>
                <div style={{fontSize:10,color:'var(--muted)',marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                  <span style={{fontFamily:'monospace'}}>{a.label.replace('com.lcband.','')}</span>
                  <span style={{marginLeft:8}}>
                    · {a.note ? a.note : `каждые ${fmtInterval(a.interval)}`}
                  </span>
                  {a.minutes_since_success != null && (
                    <span style={{marginLeft:8,color:slaCol,fontWeight:600}}>
                      · успех {fmtMinsAgo(a.minutes_since_success)}
                      {a.sla === 'sleeping' && ' 💤'}
                    </span>
                  )}
                  {!okExit && <span style={{marginLeft:8,color:'#f87171'}}>· exit {a.last_exit}</span>}
                </div>
              </div>
              <span style={{
                fontSize:10,fontWeight:700,
                padding:'2px 8px',borderRadius:10,
                background:'rgba(0,0,0,0.25)',
                color:sc.dot,
                whiteSpace:'nowrap',
              }}>
                {sc.label.toUpperCase()}
              </span>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:12,padding:10,background:'rgba(59,130,246,0.08)',borderRadius:8,fontSize:11,color:'var(--muted)'}}>
        💡 Watchdog каждые 30 минут проверяет. SLA: 🟢 зелёный в пределах 2× интервала, 🟡 жёлтый просрочен, 🔴 красный &gt; 5× интервала, 🔵 синий «спит» (по расписанию).
      </div>
    </div>
  );
}

// ── Timeline — события дня ───────────────────────────────────────────────────
function TimelineSection({ timeline }) {
  const items = timeline.items || [];
  const fmtTs = (iso) => {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    } catch { return iso.slice(11, 16); }
  };
  const kindStyle = (kind) => {
    const map = {
      'ai_call':   { emoji: '🤖', color: '#60a5fa', label: 'LLM' },
      'ai_skip':   { emoji: '❌', color: '#f87171', label: 'AI-SKIP' },
      'ai_adapt':  { emoji: '✏️', color: '#a78bfa', label: 'ADAPT' },
      'sent':      { emoji: '📤', color: '#10b981', label: 'ОТПРАВЛЕНО' },
      'error':     { emoji: '⚠️', color: '#f87171', label: 'ОШИБКА' },
    };
    return map[kind] || { emoji: '·', color: 'var(--muted)', label: kind };
  };
  if (items.length === 0) {
    return (
      <div className="section" style={{ marginTop: 14 }}>
        <div className="section-title">🕒 Таймлайн сегодня</div>
        <div style={{padding:20,textAlign:'center',color:'var(--muted)',fontSize:13}}>
          Сегодня событий ещё нет. LLM-вызовы, отправки и AI-решения будут появляться здесь.
        </div>
      </div>
    );
  }
  return (
    <div className="section" style={{ marginTop: 14 }}>
      <div className="section-title">🕒 Таймлайн сегодня ({timeline.total})</div>
      <div style={{display:'flex',flexDirection:'column',gap:4}}>
        {items.map((ev, i) => {
          const s = kindStyle(ev.kind);
          return (
            <div key={i} style={{
              display:'flex', alignItems:'flex-start', gap:10,
              padding:'6px 10px',
              background: 'rgba(255,255,255,0.02)',
              borderLeft: `3px solid ${s.color}`,
              borderRadius: 4,
            }}>
              <span style={{fontSize:10,color:'var(--muted)',fontFamily:'monospace',flexShrink:0,minWidth:40}}>
                {fmtTs(ev.ts)}
              </span>
              <span style={{fontSize:14,flexShrink:0}}>{s.emoji}</span>
              <div style={{flex:1,minWidth:0,fontSize:12}}>
                <span style={{color:s.color,fontWeight:700,marginRight:6}}>{s.label}</span>
                {ev.purpose && <span style={{color:'var(--muted)',fontSize:10,marginRight:6}}>[{ev.purpose}]</span>}
                {ev.username && <span style={{fontFamily:'monospace'}}>@{ev.username}</span>}
                {ev.decision && <span style={{marginLeft:6,color:'var(--muted)'}}>→ {ev.decision}</span>}
                {ev.reason && <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>{ev.reason.slice(0,200)}</div>}
                {ev.context && !ev.reason && <div style={{fontSize:10,color:'var(--muted)',marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{String(ev.context).slice(0,200)}</div>}
                {ev.cost_usd > 0 && <span style={{marginLeft:6,fontSize:10,color:'#f5c518'}}>${ev.cost_usd.toFixed(5)}</span>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Chat panel (CRM-style side panel) ────────────────────────────────────────
// Same-origin if we're already served by the backend (http://localhost:8878/),
// otherwise hit 127.0.0.1:8878 explicitly (works only on the same machine + browsers
// that allow mixed content to loopback — Chrome yes, Safari mostly no).
let CHAT_BACKEND = (location.port === '8878') ? '' : 'http://127.0.0.1:8878';
// Public Cloudflare tunnel URL, published by tunnel_watcher.py. If present,
// overrides the 127.0.0.1 fallback so the chat works on GitHub Pages (no mixed
// content — tunnel terminates HTTPS).
(async () => {
  if (CHAT_BACKEND === '') return;
  try {
    const r = await fetch('./backend_url.json', { cache: 'no-store' });
    if (!r.ok) return;
    const j = await r.json();
    if (j && typeof j.url === 'string' && /^https:\/\//.test(j.url)) {
      CHAT_BACKEND = j.url;
    }
  } catch { /* leave fallback */ }
})();
const ChatContext = React.createContext(null);
// Module-level cache: q → { meta, messages }. Survives panel open/close so
// we don't re-download a conversation the user already looked at.
const CHAT_CACHE = new Map();

// AI-classification tags for attention leads (keyed by lowercased username).
// Populated by App via POST /api/classify_leads and read by AttentionSection.
const AiTagsContext = React.createContext({ tags: {}, loading: false });
const AI_TAG_META = {
  decline:          { label: 'Отказ',       action: '—',         color: '#f87171', hint: 'Клиент отказал/выбрал конкурентов. Автомат перенесёт в «Не актуальные».' },
  awaiting_client:  { label: 'Ждём ответа', action: '—',         color: '#9ca3af', hint: 'Мы написали <3 дней назад, клиент молчит. Ещё рано пушить.' },
  followup_ready:   { label: 'Follow-up',   action: 'Follow up', color: '#fb923c', hint: 'Мы писали >3 дней назад, ответа нет. Sonnet подготовил draft — проверь в боте.' },
  awaiting_us:      { label: 'Ждёт нас',    action: 'Follow up', color: '#60a5fa', hint: 'Клиент задал вопрос / ждёт нашего ответа. Sonnet подготовил draft — проверь в боте.' },
  hot:              { label: 'Горячий',     action: 'Follow up', color: '#22c55e', hint: 'Активная сделка: подтверждают дату/прайс/райдер. Скоро оплата.' },
  invalid_contact:  { label: 'Нет контакта',action: 'Recheck',   color: '#a78bfa', hint: '@username не резолвится в Telegram. Ушёл в очередь повторного поиска.' },
  unknown:          { label: '—',           action: '—',         color: '#6b7280', hint: 'AI не смог классифицировать.' },
};

function UnreadBadge() {
  const [data, setData] = useState(null);
  useEffect(() => {
    let alive = true;
    const fetchUnread = async () => {
      try {
        const r = await fetch(`${CHAT_BACKEND}/api/unread`, { cache: 'no-store' });
        const j = await r.json();
        if (alive && !j.error) setData(j);
      } catch {}
    };
    fetchUnread();
    const id = setInterval(fetchUnread, 60000);
    return () => { alive = false; clearInterval(id); };
  }, []);
  if (!data) return null;
  return (
    <div className="header-sub" style={{marginTop:3}}
      title={`Непрочитанные сообщения в Telegram: ${data.dm} ЛС + ${data.groups} в чатах`}>
      ✉️ {data.total} непрочитанных <span style={{opacity:0.6}}>({data.dm} DM · {data.groups} чаты)</span>
    </div>
  );
}

function ChatPanel({ target, onClose }) {
  const [data, setData] = useState(null);
  const [err, setErr]   = useState('');
  const [draft, setDraft] = useState('');
  const [sending, setSending] = useState(false);
  const bodyRef = React.useRef(null);
  const abortRef = React.useRef(null);

  const q = target?.username || (target?.user_id ? String(target.user_id) : '');

  const fetchChat = useCallback(async (sinceId) => {
    if (!q) return;
    // Abort any previous in-flight fetch so responses for a DIFFERENT chat
    // (user hovered another card) don't land here and corrupt the panel.
    if (abortRef.current) abortRef.current.abort();
    const ctrl = new AbortController();
    abortRef.current = ctrl;
    const activeQ = q;
    const url = sinceId
      ? `${CHAT_BACKEND}/api/chat?q=${encodeURIComponent(q)}&since_id=${sinceId}`
      : `${CHAT_BACKEND}/api/chat?q=${encodeURIComponent(q)}&limit=40`;
    try {
      const r = await fetch(url, { signal: ctrl.signal });
      const j = await r.json();
      // If the user hovered another card while we were waiting, drop the response.
      if (activeQ !== q) return;
      if (j.error) { setErr(j.error); return; }
      setErr('');
      if (j.incremental) {
        // Merge new messages onto cached set (dedupe by id).
        const prev = CHAT_CACHE.get(activeQ) || data || { messages: [], meta: j.meta };
        const seen = new Set(prev.messages.map(m => m.id));
        const merged = prev.messages.concat(j.messages.filter(m => !seen.has(m.id)));
        const next = { meta: prev.meta || j.meta, messages: merged };
        CHAT_CACHE.set(activeQ, next);
        setData(next);
      } else {
        CHAT_CACHE.set(activeQ, { meta: j.meta, messages: j.messages });
        setData({ meta: j.meta, messages: j.messages });
      }
    } catch (e) {
      if (e.name === 'AbortError') return;
      setErr(`Backend не отвечает (${e.message}). Запусти dashboard_backend.py.`);
    }
  }, [q, data]);

  useEffect(() => {
    if (!target) return;
    setErr(''); setDraft('');
    // Instant paint from cache (if we've seen this chat before), then request
    // only the tail (messages newer than what's cached).
    const cached = CHAT_CACHE.get(q);
    if (cached) {
      setData(cached);
      const lastId = cached.messages.length ? cached.messages[cached.messages.length - 1].id : 0;
      fetchChat(lastId);
    } else {
      setData(null);
      fetchChat();
    }
    // Autorefresh — incremental only, cheap on backend.
    const id = setInterval(() => {
      const c = CHAT_CACHE.get(q);
      const lastId = c && c.messages.length ? c.messages[c.messages.length - 1].id : 0;
      fetchChat(lastId || undefined);
    }, 15000);
    return () => {
      clearInterval(id);
      if (abortRef.current) abortRef.current.abort();
    };
  }, [target]);   // intentionally NOT depending on fetchChat — avoid reset loops

  useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [data]);

  const send = async () => {
    const text = draft.trim();
    if (!text || sending) return;
    setSending(true); setErr('');
    try {
      const r = await fetch(`${CHAT_BACKEND}/api/send`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ q, text }),
      });
      const j = await r.json();
      if (j.error) setErr(j.error);
      else {
        setDraft('');
        const c = CHAT_CACHE.get(q);
        const lastId = c && c.messages.length ? c.messages[c.messages.length - 1].id : 0;
        fetchChat(lastId || undefined);
      }
    } catch (e) {
      setErr(e.message);
    } finally {
      setSending(false);
    }
  };

  const onKey = e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); send(); }
    if (e.key === 'Escape') onClose();
  };

  const fmt = iso => {
    try { return new Date(iso).toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }); }
    catch { return ''; }
  };

  const meta = data?.meta;
  const title = meta
    ? `${meta.first_name || ''} ${meta.last_name || ''}`.trim() || (meta.username ? `@${meta.username}` : `id${meta.user_id}`)
    : (target.client || `@${target.username}` || `id${target.user_id}`);
  const sub = meta?.username ? `@${meta.username}` : (target.username ? `@${target.username}` : '');

  return (
    <div className={`chat-panel ${target ? 'open' : ''}`}>
      <div className="chat-header">
        <div>
          <div className="chat-title">{title}</div>
          {sub && <div className="chat-sub">{sub}</div>}
        </div>
        <button className="chat-close" onClick={onClose} title="Закрыть (Esc)">×</button>
      </div>
      {err && <div className="chat-error">{err}</div>}
      <div className="chat-body" ref={bodyRef}>
        {!data && !err && <div className="chat-loading">Загружаю переписку…</div>}
        {data?.messages?.length === 0 && <div className="chat-loading">Нет сообщений</div>}
        {data?.messages?.map(m => (
          <div key={m.id} style={{display:'flex', flexDirection:'column', alignItems: m.out ? 'flex-end' : 'flex-start'}}>
            <div className={`chat-msg ${m.out ? 'chat-msg-out' : 'chat-msg-in'}`}>
              {m.text || (m.media ? '📎 медиа' : '')}
            </div>
            <div className="chat-msg-time">{fmt(m.date)}</div>
          </div>
        ))}
      </div>
      <div className="chat-input-row">
        <textarea
          className="chat-input"
          placeholder="Ответ клиенту… (Ctrl+Enter — отправить, Esc — закрыть)"
          value={draft}
          onChange={e => setDraft(e.target.value)}
          onKeyDown={onKey}
          rows={2}
        />
        <button className="chat-send" onClick={send} disabled={sending || !draft.trim()}>
          {sending ? '…' : '➤'}
        </button>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [rows,      setRows]      = useState(null);
  const [dbSnapshot, setDbSnapshot] = useState(null);
  const [sessionLog, setSessionLog] = useState(null);
  const [activity24h, setActivity24h] = useState(null);
  const [loading,   setLoading]   = useState(true);
  const [refreshing,setRefreshing]= useState(false);
  const [error,     setError]     = useState(null);
  const [updatedAt, setUpdatedAt] = useState(null);
  const [offline,   setOffline]   = useState(!navigator.onLine);
  const [showTGModal, setShowTGModal] = useState(false);
  const [showProcess, setShowProcess] = useState(null);
  const [chatTarget, setChatTarget] = useState(null);
  const [aiTags, setAiTags] = useState({});
  const [aiLoading, setAiLoading] = useState(false);
  const [activeTab, setActiveTab] = useState(() => {
    try { return localStorage.getItem('lcb_tab') || 'overview'; } catch { return 'overview'; }
  });
  useEffect(() => {
    try { localStorage.setItem('lcb_tab', activeTab); } catch {}
  }, [activeTab]);

  // На десктопе при открытом чате сдвигаем .app так, чтобы правая граница
  // упиралась в левый край слайд-панели (440px)
  useEffect(() => {
    document.body.classList.toggle('chat-open', !!chatTarget);
    return () => document.body.classList.remove('chat-open');
  }, [chatTarget]);

  useEffect(() => {
    const on  = () => setOffline(false);
    const off = () => setOffline(true);
    window.addEventListener('online',  on);
    window.addEventListener('offline', off);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  }, []);

  const load = useCallback(async (isRefresh = false) => {
    if (isRefresh) setRefreshing(true);
    try {
      const data = await fetchSheet('Dashboard');
      setRows(data);
      setError(null);
      setUpdatedAt(new Date());
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
      setRefreshing(false);
    }
    // ── DB snapshot (fast, bot-written rows visible immediately) ──
    try {
      const bu = (typeof CHAT_BACKEND !== 'undefined') ? CHAT_BACKEND : '';
      const r = await fetch(`${bu}/api/db/snapshot`, { cache: 'no-store' });
      if (r.ok) {
        const snap = await r.json();
        setDbSnapshot(snap);
      }
    } catch { /* backend offline → fall back to gviz data only */ }

    // ── Session actions (what Claude did in the current work session) ──
    try {
      const bu = (typeof CHAT_BACKEND !== 'undefined') ? CHAT_BACKEND : '';
      const r = await fetch(`${bu}/api/session_actions?limit=100`, { cache: 'no-store' });
      if (r.ok) {
        setSessionLog(await r.json());
      }
    } catch { /* backend offline → session tab will show "not available" */ }

    // ── Process activity over last 24h (counts per process + Browser Walk) ──
    try {
      const bu = (typeof CHAT_BACKEND !== 'undefined') ? CHAT_BACKEND : '';
      const r = await fetch(`${bu}/api/process_activity_24h`, { cache: 'no-store' });
      if (r.ok) {
        setActivity24h(await r.json());
      }
    } catch { /* backend offline → status rows render without 24h counts */ }
  }, []);

  useEffect(() => {
    load();
    const t = setInterval(() => load(true), REFRESH_MS);
    return () => clearInterval(t);
  }, [load]);

  const data = useMemo(() => {
    if (!rows) return null;
    const d = processRows(rows);
    // ── Override orders + refused with fresh DB snapshot when available.
    // DB is populated by bots directly (instant) and by sheets_to_db_sync (60s).
    // If backend is down, d.* stays as gviz-derived values.
    if (dbSnapshot && dbSnapshot.active) {
      d.orders = dbSnapshot.active.slice(0, 30).map(o => ({
        status:       o.status,
        date_posted:  o.posted,
        date_event:   o.event_date,
        client:       o.client,
        username:     o.username,
        contact:      o.contact,
        desc:         o.desc,
        location:     o.location,
        source_chat:  o.source_chat,
        history:      o.history,
        channel:      o.channel,
        last_activity: o.last_activity,
      }));
      // Full list of active leads — for funnel stage drill-down (amoCRM-style click)
      d.allLeads = dbSnapshot.active;
      d.allArchived = dbSnapshot.archived || [];
      d.pendingDrafts = dbSnapshot.pending_drafts || [];
      d.dbSync = dbSnapshot.sync;
    }
    if (dbSnapshot && dbSnapshot.archived) {
      const total = dbSnapshot.stats?.archived || dbSnapshot.archived.length;
      d.refused = {
        total,
        recent: dbSnapshot.archived.slice(0, 10).map(o => ({
          status:  o.status,
          date:    o.last_activity || o.posted,
          name:    o.client,
          username: o.contact,
          reason:  (o.history || '').slice(-200),
        })),
      };
    }
    return d;
  }, [rows, dbSnapshot]);

  // После загрузки attention — классифицируем лиды через /api/classify_leads.
  // Кэшируем в aiTags, чтобы не гонять Claude каждый раз.
  useEffect(() => {
    const items = data?.attention?.items || [];
    const usernames = [...new Set(items
      .filter(it => it.channel === 'TG' && it.username)
      .map(it => String(it.username).toLowerCase()))];
    const missing = usernames.filter(u => !(u in aiTags));
    if (!missing.length) return;
    setAiLoading(true);
    // Читаем из кэша (attention_classify_cache.py пишет каждые 15 мин).
    // Cloudflare-tunnel-safe — endpoint отвечает <100мс, не завязан на Sonnet.
    const q = missing.map(encodeURIComponent).join(',');
    fetch(`${CHAT_BACKEND}/api/classifications?usernames=${q}`)
      .then(r => r.json())
      .then(j => {
        if (!j || typeof j !== 'object' || j.error) return;
        const normalized = {};
        for (const [k, v] of Object.entries(j)) normalized[k.toLowerCase()] = v;
        setAiTags(prev => ({ ...prev, ...normalized }));
      })
      .catch(() => {})
      .finally(() => setAiLoading(false));
  }, [data?.attention?.items?.length]);


  // Fast polling (30s) when scan is active
  useEffect(() => {
    if (!data || !data.scan) return;
    const active = data.scan.status === 'scanning' || data.scan.status === 'needs_permission';
    if (!active) return;
    const fast = setInterval(() => load(true), 30000);
    return () => clearInterval(fast);
  }, [data?.scan?.status, load]);

  const timeStr = updatedAt
    ? updatedAt.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' })
    : null;

  return (
    <AiTagsContext.Provider value={{ tags: aiTags, loading: aiLoading }}>
    <ChatContext.Provider value={{ openChat: setChatTarget }}>
    <div className="app">
      {/* Header */}
      <div className="header">
        <div className="header-row">
          <div className="header-brand">
            <span className="header-note">🎶</span>
            <div>
              <div className="header-title">
                LCB Dashboard
                {offline && <span className="offline-pill">offline</span>}
              </div>
              {timeStr && <div className="header-sub">Обновлено: {timeStr}</div>}
              <UnreadBadge />
            </div>
          </div>
          <button
            className="refresh-btn"
            onClick={() => load(true)}
            disabled={refreshing}
          >
            <span className={refreshing ? 'spin' : ''}>↻</span>
          </button>
        </div>
      </div>

      {/* Error */}
      {error && (
        <div className="err-box">
          ⚠️ {error}
          <small>
            Убедитесь что Google Sheets доступна публично.<br/>
            Запустите: <code>python3 sync_dashboard_data.py</code>
          </small>
        </div>
      )}

      {/* Loading skeleton */}
      {loading && !rows && <SkeletonCards />}

      {/* Content */}
      {data && (
        <>
          <ConnectionStatus connection={data.connection} vkConnection={data.vkConnection} />
          <TabBar
            activeTab={activeTab}
            setActiveTab={setActiveTab}
            attentionCount={data.attention?.total || 0}
            refusalCount={Object.values(data.refusalCategories || {}).reduce((a,b) => a+b, 0)}
            paidCount={data.paid?.total || 0}
            agentsMissing={(data.agents?.missing || 0) + (data.agents?.staleSla || 0)}
            aiCalls={data.aiUsage?.totalCalls || 0}
            sessionCount={sessionLog?.total || 0}
          />

          {activeTab === 'overview' && (
            <>
              <StatusSection status={data.status} activity24h={activity24h} onProcessClick={setShowProcess} />
              <ActionButtons />
              <KPISection kpi={data.kpi} setActiveTab={setActiveTab}
                          browserWalk={data.browserWalk || {leads:0, refusals:0, chats:0, ranAt:'', hours:48, items:[]}} />
              <div className="section" style={{ marginTop: 8 }}>
                <TGLeadsButton
                  onClick={() => setShowTGModal(true)}
                  tgWeek={data.tgFunnel?.week}
                />
              </div>
              <FunnelSplitSections
                allLeads={data.allLeads || []}
                archived={data.allArchived || []}
                pendingDrafts={data.pendingDrafts || []}
                sessionLog={sessionLog || null}
              />
              <OrdersSection orders={data.orders} />
              <ScanStatus scan={data.scan} />
              <FollowupsSection followups={data.followups} />
            </>
          )}

          {activeTab === 'new' && (
            <SessionSection session={sessionLog || {total:0, items:[], counts:{}, sessions:[], session:''}} />
          )}

          {activeTab === 'attention' && (
            <AttentionSection attention={data.attention || {total:0, items:[]}} />
          )}

          {activeTab === 'paid' && (
            <PaidSection paid={data.paid || {total:0, items:[]}} />
          )}

          {activeTab === 'refusals' && (
            <>
              <AISkipSection aiSkips={data.aiSkips} />
              <RefusalsSection refused={data.refused} categories={data.refusalCategories || {}} />
            </>
          )}

          {activeTab === 'broadcasts' && (
            <BroadcastsSection categories={data.refusalCategories || {}} />
          )}

          {activeTab === 'processes' && (
            <ProcessesSection agents={data.agents || {total:0, running:0, missing:0, items:[]}} />
          )}

          {activeTab === 'timeline' && (
            <TimelineSection timeline={data.timeline || {total:0, items:[]}} />
          )}

          {activeTab === 'ai' && (
            <AIUsageSection aiUsage={data.aiUsage || {totalCalls:0, totalCost:0, skip:0, adapt:0, ok:0, services:{}}} />
          )}

          {showTGModal && (
            <TGFunnelModal
              tgFunnel={data.tgFunnel || {}}
              onClose={() => setShowTGModal(false)}
            />
          )}
          {showProcess && (
            <ProcessRulesModal
              processKey={showProcess}
              onClose={() => setShowProcess(null)}
            />
          )}
        </>
      )}
      {chatTarget && <ChatPanel target={chatTarget} onClose={() => setChatTarget(null)} />}
    </div>
    </ChatContext.Provider>
    </AiTagsContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

// Service Worker registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('[SW] registered', r.scope))
      .catch(e => console.log('[SW] failed', e));
  });
}
</script>
</body>

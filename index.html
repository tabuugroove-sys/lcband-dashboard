<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LCB Dashboard</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LCB" />
  <style>
    :root {
      --bg:       #0a0a12;
      --card:     #13131f;
      --card2:    #1a1a2a;
      --border:   #23233a;
      --gold:     #f5c518;
      --gold-dim: #c9a20044;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --ok:       #10b981;
      --warn:     #f59e0b;
      --err:      #ef4444;
      --blue:     #3b82f6;
      --r:        12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: contain;
    }
    #root { min-height: 100%; }

    /* вФАвФА App shell вФАвФА */
    .app { max-width: 480px; margin: 0 auto; padding-bottom: 40px; }

    /* –І—Г—В—М —И–Є—А–µ –љ–∞ –њ–ї–∞–љ—И–µ—В–µ/–і–µ—Б–Ї—В–Њ–њ–µ вАФ –Ї–Њ–љ—В–µ–љ—В –і—Л—И–Є—В, –љ–Њ mobile –љ–µ –ї–Њ–Љ–∞–µ–Љ */
    .app { transition: max-width .25s ease, margin .25s ease; }
    @media (min-width: 768px) {
      .app { max-width: 720px; }
    }
    @media (min-width: 1024px) {
      .app { max-width: 960px; padding-left: 16px; padding-right: 16px; }
    }
    @media (min-width: 1440px) {
      .app { max-width: 1180px; }
    }

    /* –Ъ–Њ–≥–і–∞ –Њ—В–Ї—А—Л—В —З–∞—В-–њ–∞–љ–µ–ї—М (440px —Б–њ—А–∞–≤–∞) вАФ —Б–і–≤–Є–≥–∞–µ–Љ .app —В–∞–Ї,
       —З—В–Њ–±—Л –њ—А–∞–≤–∞—П –≥—А–∞–љ–Є—Ж–∞ –Ї–Њ–љ—В–µ–љ—В–∞ –£–Я–Ш–†–Р–Ы–Р–°–ђ –≤ –ї–µ–≤—Л–є –Ї—А–∞–є –њ–∞–љ–µ–ї–Є */
    @media (min-width: 900px) {
      body.chat-open .app {
        max-width: calc(100vw - 440px - 16px);
        margin-left: 16px;
        margin-right: 440px;
      }
    }

    /* –®–Є—А–µ вЖТ KPI-–њ–ї–Є—В–Ї–Є –Љ–Њ–≥—Г—В –±—Л—В—М 4-6 –≤ —А—П–і */
    @media (min-width: 768px) {
      .kpi-grid { grid-template-columns: repeat(3, 1fr); }
      .kpi-row  { grid-template-columns: repeat(4, 1fr); }
    }
    @media (min-width: 1024px) {
      .kpi-grid { grid-template-columns: repeat(6, 1fr); }
      .kpi-row  { grid-template-columns: repeat(5, 1fr); }
      .kpi-val  { font-size: 28px; }
    }

    /* вФАвФА Header вФАвФА */
    .header {
      background: linear-gradient(180deg, #0f0f20 0%, #0a0a12 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px env(safe-area-inset-top, 0);
      position: sticky; top: 0; z-index: 100;
    }
    .header-row { display: flex; justify-content: space-between; align-items: center; }
    .header-brand { display: flex; align-items: center; gap: 8px; }
    .header-note { font-size: 20px; }
    .header-title { font-size: 18px; font-weight: 700; color: var(--gold); letter-spacing: 0.3px; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .refresh-btn {
      background: rgba(245,197,24,.08);
      border: 1px solid rgba(245,197,24,.2);
      border-radius: 8px; color: var(--gold);
      padding: 6px 14px; font-size: 13px; cursor: pointer;
      transition: opacity .15s;
    }
    .refresh-btn:active { opacity: .6; }
    .refresh-btn:disabled { opacity: .4; cursor: default; }
    .spin { display: inline-block; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* вФАвФА Sections вФАвФА */
    .section { padding: 14px 14px 0; }
    .section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.4px; color: var(--muted); margin-bottom: 10px;
    }

    /* вФАвФА KPI top row вФАвФА */
    .kpi-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 8px; }
    .kpi-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px 8px; text-align: center;
      position: relative;
    }
    .kpi-emoji { font-size: 18px; margin-bottom: 4px; }
    .kpi-val { font-size: 24px; font-weight: 800; color: var(--gold); line-height: 1; }
    .kpi-lbl { font-size: 10px; color: var(--muted); margin-top: 4px; }

    /* вФАвФА KPI secondary вФАвФА */
    .kpi-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .kpi-mini {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 10px;
      position: relative;
    }
    .kpi-mini-val { font-size: 18px; font-weight: 700; }
    .kpi-mini-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* вФАвФА Info-–Є–Ї–Њ–љ–Ї–∞ + –Ї–∞—Б—В–Њ–Љ–љ–∞—П –њ–Њ–і—Б–Ї–∞–Ј–Ї–∞ вФАвФА */
    .kpi-info {
      position: absolute; top: 5px; right: 6px;
      width: 14px; height: 14px; border-radius: 50%;
      background: rgba(96,165,250,0.15); color: var(--blue);
      font-size: 10px; font-weight: 700; font-family: serif;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: help; opacity: 0.55; user-select: none;
      transition: opacity .15s, background .15s;
    }
    .kpi-info:hover, .kpi-info:focus { opacity: 1; background: rgba(96,165,250,0.3); outline: none; }
    .kpi-tip {
      visibility: hidden; opacity: 0;
      position: absolute; z-index: 60;
      top: 24px; right: 0;
      width: 220px; padding: 8px 10px;
      background: #1e293b; color: #e2e8f0;
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 11px; line-height: 1.4;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
      text-align: left; white-space: normal;
      transition: opacity .15s, visibility .15s;
      pointer-events: none;
    }
    .kpi-info:hover + .kpi-tip,
    .kpi-info:focus + .kpi-tip { visibility: visible; opacity: 1; }

    /* вФАвФА –Ъ–ї–Є–Ї –њ–Њ KPI-–Ї–∞—А—В–Њ—З–Ї–µ = –љ–∞–≤–Є–≥–∞—Ж–Є—П –Ї –Ј–∞–Ї–∞–Ј–∞–Љ/—В–∞–±—Г вФАвФА */
    .kpi-clickable { cursor: pointer; transition: transform .12s, border-color .12s, background .12s; }
    .kpi-clickable:hover { transform: translateY(-1px); border-color: var(--blue);
                            background: rgba(96,165,250,0.06); }
    .kpi-clickable:active { transform: translateY(0); }

    /* вФАвФА Funnel вФАвФА */
    .funnel-wrap {
      display: flex; overflow-x: auto; gap: 0; padding: 2px 0 10px;
      scrollbar-width: none;
    }
    .funnel-wrap::-webkit-scrollbar { display: none; }
    .funnel-step { display: flex; align-items: center; flex-shrink: 0; }
    .funnel-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 10px 12px; text-align: center; min-width: 76px;
    }
    .funnel-num { font-size: 22px; font-weight: 800; color: var(--gold); }
    .funnel-name { font-size: 10px; color: var(--muted); margin-top: 2px; white-space: nowrap; }
    .funnel-pct { font-size: 9px; color: var(--ok); margin-top: 2px; }
    .funnel-arr { color: var(--muted); font-size: 14px; padding: 0 3px; flex-shrink: 0; }
    .funnel-box--clickable { cursor: pointer; transition: border-color .15s, transform .12s; }
    .funnel-box--clickable:hover { border-color: var(--gold); transform: translateY(-1px); }
    .funnel-box--active { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset; }

    /* вФАвФА Funnel expanded leads panel вФАвФА */
    .funnel-expand {
      margin-top: 12px; background: var(--card2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px;
    }
    .funnel-expand-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .funnel-expand-title { font-size: 13px; font-weight: 700; color: var(--fg); }
    .funnel-expand-count { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 4px; }
    .funnel-expand-close {
      background: transparent; border: none; color: var(--muted);
      font-size: 14px; cursor: pointer; padding: 4px 8px;
    }
    .funnel-expand-close:hover { color: var(--gold); }
    .funnel-lead-list {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 420px; overflow-y: auto;
    }
    .funnel-lead-card {
      display: flex; align-items: center; gap: 10px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px;
    }
    .funnel-lead-info { flex: 1; min-width: 0; }
    .funnel-lead-name { font-size: 13px; font-weight: 600; color: var(--fg); }
    .funnel-lead-status { font-size: 10px; color: var(--blue); font-weight: 600; margin-left: 4px; }
    .funnel-lead-meta {
      font-size: 10px; color: var(--muted); margin-top: 3px;
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    .funnel-lead-desc {
      font-size: 11px; color: var(--muted); margin-top: 4px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .funnel-lead-chat {
      flex-shrink: 0; background: var(--card2); border: 1px solid var(--border);
      color: var(--fg); border-radius: 6px; padding: 8px 12px;
      font-size: 15px; text-decoration: none; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s, color .15s;
    }
    .funnel-lead-chat:hover { background: var(--gold); color: #000; border-color: var(--gold); }
    .funnel-lead-chat--disabled { opacity: 0.35; cursor: default; pointer-events: none; }

    /* вФАвФА Funnel branches row (under main strip) вФАвФА */
    .funnel-branches-wrap {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 8px; padding: 0 2px;
    }
    .funnel-branch-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; border: 1px dashed var(--border);
      border-radius: 8px; padding: 5px 9px;
      font-size: 10px; color: var(--muted);
      cursor: pointer; transition: all .15s;
    }
    .funnel-branch-chip:hover { border-color: var(--gold); color: var(--fg); border-style: solid; }
    .funnel-branch-chip--active { border-color: var(--gold); border-style: solid; color: var(--fg); background: var(--card); }
    .funnel-branch-chip-icon { font-size: 12px; }
    .funnel-branch-chip-num { font-weight: 700; color: var(--fg); }
    .funnel-branch-chip-parent { font-size: 9px; color: var(--muted); opacity: 0.7; }

    /* вФАвФА Orders вФАвФА */
    .orders-list { display: flex; flex-direction: column; gap: 8px; }
    .order-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px 14px;
      display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
    }
    .order-info { flex: 1; min-width: 0; }
    .order-client { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .order-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .order-desc-preview {
      font-size: 11px; color: var(--muted); margin-top: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      opacity: 0.8;
    }
    .order-card-hoverable { position: relative; }
    .order-card-hoverable:hover { border-color: var(--blue); }
    .order-tip {
      visibility: hidden; opacity: 0;
      position: absolute; z-index: 50;
      padding: 12px 14px;
      background: #0f172a; color: #e2e8f0;
      border: 1px solid #334155; border-radius: 8px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.5);
      font-size: 12px; line-height: 1.5;
      transition: opacity .15s, visibility .15s;
      pointer-events: none;
    }
    .order-tip-side-left > .order-tip {
      top: 0; right: calc(100% + 8px); left: auto;
      width: 440px; max-width: calc(100vw - 40px);
    }
    .order-tip-side-right > .order-tip {
      top: 0; left: calc(100% + 8px); right: auto;
      width: 440px; max-width: calc(100vw - 40px);
    }
    .order-tip-side-bottom > .order-tip {
      top: calc(100% + 6px); left: 0; right: 0;
      max-width: 520px;
    }
    .order-card-hoverable:hover .order-tip,
    .order-card-hoverable:focus-within .order-tip { visibility: visible; opacity: 1; }
    .order-tip-label {
      font-size: 10px; font-weight: 700; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
    }
    .order-tip-body {
      font-size: 12px; color: #e2e8f0; white-space: pre-wrap;
      max-height: 180px; overflow-y: auto;
    }
    .order-tip-history { font-size: 11px; color: #cbd5e1; }
    .order-tip-hist-line {
      padding: 3px 0; border-top: 1px solid #1e293b;
    }
    .order-tip-hist-line:first-child { border-top: none; }
    .badge {
      font-size: 10px; font-weight: 700; padding: 3px 9px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .badge-new  { background: rgba(59,130,246,.15); color: #60a5fa; }
    .badge-wip  { background: rgba(16,185,129,.15);  color: #34d399; }
    .badge-done { background: rgba(245,197,24,.15);  color: var(--gold); }
    .badge-no   { background: rgba(239,68,68,.15);   color: #f87171; }
    .badge-gray { background: rgba(100,116,139,.15); color: var(--muted); }

    /* вФАвФА Process status вФАвФА */
    .status-list { display: flex; flex-direction: column; gap: 6px; }
    .status-row {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-ok   { background: var(--ok);   box-shadow: 0 0 6px var(--ok); }
    .dot-warn { background: var(--warn); }
    .dot-err  { background: var(--err);  }
    .dot-unk  { background: var(--muted); }
    .status-name { flex: 1; font-size: 13px; }
    .status-age  { font-size: 11px; color: var(--muted); }

    /* вФАвФА Followups вФАвФА */
    .followup-list { display: flex; flex-direction: column; gap: 6px; }

    /* вФАвФА Scan status вФАвФА */
    .scan-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px; margin-top: 8px;
    }
    .scan-card-active { border-color: var(--gold); }
    .scan-card-permission { border-color: var(--err); animation: pulse-err 1.5s ease infinite; }
    .scan-card-error { border-color: var(--err); }
    .scan-card-done { border-color: var(--ok); }
    .scan-progress-bar {
      height: 6px; border-radius: 3px; background: var(--card2);
      margin: 10px 0 8px; overflow: hidden;
    }
    .scan-progress-fill {
      height: 100%; border-radius: 3px; background: var(--gold);
      transition: width .4s ease;
    }
    .scan-result-item {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; margin-top: 6px;
      font-size: 12px; line-height: 1.4;
    }
    .followup-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .followup-left { min-width: 0; }
    .followup-user { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .followup-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .chip {
      font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 12px; flex-shrink: 0; white-space: nowrap;
    }
    .chip-noreply    { background: rgba(100,116,139,.15); color: var(--muted); }
    .chip-interested { background: rgba(245,197,24,.15);  color: var(--gold); }
    .chip-customer   { background: rgba(16,185,129,.15);  color: var(--ok); }
    .chip-declined   { background: rgba(239,68,68,.15);   color: #f87171; }

    /* вФАвФА Overdue order alert вФАвФА */
    @keyframes pulse-overdue {
      0%, 100% { border-color: rgba(239,68,68,.55); box-shadow: 0 0 8px rgba(239,68,68,.25); }
      50% { border-color: rgba(239,68,68,1); box-shadow: 0 0 18px rgba(239,68,68,.55); }
    }
    .order-card-overdue {
      animation: pulse-overdue 1.6s ease infinite;
      border-color: rgba(239,68,68,.55) !important;
      background: rgba(239,68,68,.05) !important;
    }

    /* вФАвФА Loading skeleton вФАвФА */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skel {
      background: linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%);
      background-size: 400px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--r);
    }

    /* вФАвФА Error вФАвФА */
    .err-box {
      background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25);
      border-radius: var(--r); padding: 14px; margin: 14px;
      font-size: 13px; color: #f87171; line-height: 1.5;
    }
    .err-box small { color: var(--muted); display: block; margin-top: 6px; }

    /* вФАвФА Offline pill вФАвФА */
    .offline-pill {
      background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3);
      border-radius: 20px; padding: 3px 10px; font-size: 11px; color: #f87171;
      display: inline-block; margin-left: 8px;
    }

    /* вФАвФА Connection status вФАвФА */
    .conn-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .conn-dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
    }
    .conn-dot-ok    { background: var(--ok);   box-shadow: 0 0 8px var(--ok); }
    .conn-dot-err   { background: var(--err);  box-shadow: 0 0 8px var(--err); animation: pulse-err 1.5s ease infinite; }
    .conn-dot-unk   { background: var(--muted); }
    @keyframes pulse-err {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .conn-info { flex: 1; }
    .conn-label { font-size: 13px; font-weight: 600; }
    .conn-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .conn-sessions { display: flex; gap: 8px; margin-top: 8px; }
    .conn-session-chip {
      font-size: 10px; padding: 2px 8px; border-radius: 10px;
      display: flex; align-items: center; gap: 4px;
    }
    .conn-chip-ok  { background: rgba(16,185,129,.12); color: var(--ok); }
    .conn-chip-err { background: rgba(239,68,68,.12); color: #f87171; }
    .conn-chip-unk { background: rgba(100,116,139,.12); color: var(--muted); }

    /* вФАвФА Action buttons вФАвФА */
    .action-btns { display: flex; gap: 8px; margin: 4px 16px 0; }
    .action-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 10px 8px;
      color: var(--text); font-size: 12px; font-weight: 600;
      text-decoration: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    .action-btn:active { background: var(--card2); }
    .action-btn-restart { border-color: rgba(16,185,129,.3); }
    .action-btn-restart:active { background: rgba(16,185,129,.08); }
    .action-btn-status { border-color: rgba(59,130,246,.3); }
    .action-btn-status:active { background: rgba(59,130,246,.08); }

    /* вФАвФА Empty state вФАвФА */

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// вФАвФА Config вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
const SHEET_ID    = '1egw7DYnajhLfGcpxqHcjSvN_-WXDDkUZDVvKUFZyrWs';
const REFRESH_MS  = 5 * 60 * 1000;  // 5 min

// вФАвФА Google Sheets gviz parser вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function parseGviz(text) {
  try {
    const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)\s*;?\s*$/);
    if (!m) throw new Error('No gviz wrapper');
    const obj = JSON.parse(m[1]);
    if (!obj.table) return [];
    const { cols, rows } = obj.table;
    const headers = cols.map(c => c.label || c.id || '');
    return (rows || []).map(row =>
      Object.fromEntries((row.c || []).map((cell, i) => [headers[i], cell?.v ?? null]))
    );
  } catch (e) {
    console.error('[parseGviz]', e.message);
    return [];
  }
}

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(sheetName)}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status} –і–ї—П –ї–Є—Б—В–∞ ¬Ђ${sheetName}¬ї`);
  return parseGviz(await resp.text());
}

// вФАвФА Data processing вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function processRows(rows) {
  const kpi      = {};
  const funnel   = [];
  const status   = [];
  const followups = [];
  const orders   = [];
  const refused  = { total: 0, recent: [] };
  const attention = { total: 0, requires_user: 0, today: 0, overdue: 0, items: [] };
  const paid = { total: 0, items: [] };
  const refusalCategories = {};  // { low_budget: 15, format_mismatch: 1, ... }
  const channels = {};  // { TG: 91, VK: 5, ... }
  const tgFunnel = {};  // { day: {sent,leads,paid,earned}, week: {вА¶}, вА¶ }
  const connection = { status: 'unknown', lastCheck: null, sessions: {} };
  const vkConnection = { status: 'unknown', lastCheck: null, reason: '', tokens: {} };
  const scan = { status: 'idle', progress: 0, message: '', results: [], chatsChecked: [], updated: '' };
  const agents = { total: 0, running: 0, missing: 0, staleSla: 0, items: [] };
  const newLeads = { total: 0, items: [] };
  const aiSkips = { total: 0, items: [] };
  const aiUsage = { totalCalls: 0, totalCost: 0, skip: 0, adapt: 0, ok: 0, services: {} };
  const timeline = { total: 0, items: [] };
  const browserWalk = { leads: 0, refusals: 0, chats: 0, ranAt: '', hours: 48, items: [] };

  for (const row of rows) {
    if (!row.key) continue;
    const section = row.section;
    if (section === 'KPI')     kpi[row.key]    = row.value;
    if (section === 'Funnel')  funnel.push({ key: row.key, n: Number(row.value) || 0, label: row.label });
    if (section === 'Status') {
      const parts = (row.value || '').split('|');
      status.push({ key: row.key, val: parts[0], reason: parts[1] || '', action: parts[2] || '', label: row.label });
    }
    if (section === 'Followup') {
      try { followups.push(JSON.parse(row.value)); } catch { followups.push({ user: row.label }); }
    }
    if (section === 'Order') {
      try { orders.push(JSON.parse(row.value)); } catch { /* skip */ }
    }
    if (section === 'Refused') {
      if (row.key === 'refused_total') {
        refused.total = Number(row.value) || 0;
        kpi.refused_total = row.value;  // –њ—А–Њ–і—Г–±–ї–Є—А–Њ–≤–∞—В—М –≤ KPI вАФ –і–ї—П –Љ–Є–љ–Є-–њ–ї–Є—В–Ї–Є
      } else if (row.key?.startsWith('refused_')) {
        try { refused.recent.push(JSON.parse(row.value)); } catch { /* skip */ }
      }
    }
    if (section === 'Attention') {
      if (row.key === 'attention_total')    attention.total = Number(row.value) || 0;
      if (row.key === 'attention_user')     attention.requires_user = Number(row.value) || 0;
      if (row.key === 'attention_today')    attention.today = Number(row.value) || 0;
      if (row.key === 'attention_overdue')  attention.overdue = Number(row.value) || 0;
      if (row.key?.match(/^attention_\d+$/)) {
        try { attention.items.push(JSON.parse(row.value)); } catch { /* skip */ }
      }
    }
    if (section === 'Paid') {
      if (row.key === 'paid_total') paid.total = Number(row.value) || 0;
      if (row.key?.match(/^paid_\d+$/)) {
        try { paid.items.push(JSON.parse(row.value)); } catch { /* skip */ }
      }
    }
    if (section === 'RefusalCategory' && row.key?.startsWith('refcat_')) {
      const cat = row.key.replace('refcat_', '');
      refusalCategories[cat] = Number(row.value) || 0;
    }
    if (section === 'Channel' && row.key?.startsWith('channel_')) {
      const ch = row.key.replace('channel_', '');
      channels[ch] = Number(row.value) || 0;
    }
    if (section === 'TGFunnel') {
      const m = (row.key || '').match(/^tg_funnel_(day|week|month|year)_(sent|leads|paid|earned)$/);
      if (m) {
        const [, period, metric] = m;
        if (!tgFunnel[period]) tgFunnel[period] = {};
        tgFunnel[period][metric] = Number(row.value) || 0;
      }
    }
    if (section === 'Scan') {
      if (row.key === 'scan_status') scan.status = row.value || 'idle';
      if (row.key === 'scan_progress') scan.progress = Number(row.value) || 0;
      if (row.key === 'scan_message') scan.message = row.value || '';
      if (row.key === 'scan_updated') scan.updated = row.value || '';
      if (row.key === 'scan_results') {
        try { scan.results = JSON.parse(row.value); } catch { scan.results = []; }
      }
      if (row.key === 'scan_chats_checked') {
        try { scan.chatsChecked = JSON.parse(row.value); } catch { scan.chatsChecked = []; }
      }
    }
    if (section === 'Connection') {
      if (row.key === 'conn_status') {
        const [st, reason] = (row.value || '').split('|');
        connection.status = st;
        connection.reason = reason || '';
      } else if (row.key === 'conn_last_check') {
        connection.lastCheck = row.value;
      } else if (row.key?.startsWith('conn_')) {
        const sessName = row.label || row.key.replace('conn_', '');
        const [st, reason] = (row.value || '').split('|');
        connection.sessions[sessName] = st;
        if (!connection.sessionReasons) connection.sessionReasons = {};
        if (reason) connection.sessionReasons[sessName] = reason;
      }
    }
    if (section === 'VKConnection') {
      if (row.key === 'vk_conn_status') {
        const [st, reason] = (row.value || '').split('|');
        vkConnection.status = st;
        vkConnection.reason = reason || '';
      } else if (row.key === 'vk_conn_last_check') {
        vkConnection.lastCheck = row.value;
      } else if (row.key?.startsWith('vk_conn_')) {
        const tokenName = row.key.replace('vk_conn_', '');
        const [st, reason] = (row.value || '').split('|');
        vkConnection.tokens[tokenName] = { status: st, reason, label: row.label };
      }
    }
    if (section === 'Agents') {
      if (row.key === 'agents_total')   agents.total = Number(row.value) || 0;
      else if (row.key === 'agents_running') agents.running = Number(row.value) || 0;
      else if (row.key === 'agents_missing') agents.missing = Number(row.value) || 0;
      else if (row.key === 'agents_stale_sla') agents.staleSla = Number(row.value) || 0;
      else if (row.key?.match(/^agent_\d+$/)) {
        try { agents.items.push(JSON.parse(row.value)); } catch { /* skip */ }
      }
    }
    if (section === 'NewLeads') {
      if (row.key === 'newleads_total') newLeads.total = Number(row.value) || 0;
      else if (row.key?.match(/^newlead_\d+$/)) {
        try { newLeads.items.push(JSON.parse(row.value)); } catch { /* skip */ }
      }
    }
    if (section === 'AISkip') {
      if (row.key === 'aiskip_total') aiSkips.total = Number(row.value) || 0;
      else if (row.key?.match(/^aiskip_\d+$/)) {
        try { aiSkips.items.push(JSON.parse(row.value)); } catch { /* skip */ }
      }
    }
    if (section === 'BrowserWalk') {
      if (row.key === 'bw_leads')    browserWalk.leads    = Number(row.value) || 0;
      else if (row.key === 'bw_refusals') browserWalk.refusals = Number(row.value) || 0;
      else if (row.key === 'bw_chats')    browserWalk.chats    = Number(row.value) || 0;
      else if (row.key === 'bw_ran_at')   browserWalk.ranAt    = row.value || '';
      else if (row.key === 'bw_hours')    browserWalk.hours    = Number(row.value) || 48;
      else if (row.key?.match(/^bw_lead_\d+$/)) {
        try { browserWalk.items.push(JSON.parse(row.value)); } catch {}
      }
    }
    if (section === 'AIUsage') {
      if (row.key === 'ai_total_calls')    aiUsage.totalCalls = Number(row.value) || 0;
      else if (row.key === 'ai_total_cost_usd') aiUsage.totalCost = Number(row.value) || 0;
      else if (row.key === 'ai_skip_count')  aiUsage.skip = Number(row.value) || 0;
      else if (row.key === 'ai_adapt_count') aiUsage.adapt = Number(row.value) || 0;
      else if (row.key === 'ai_ok_count')    aiUsage.ok = Number(row.value) || 0;
      else if (row.key?.startsWith('ai_svc_')) {
        try {
          const svcName = row.key.replace('ai_svc_', '');
          aiUsage.services[svcName] = JSON.parse(row.value);
        } catch { /* skip */ }
      }
    }
    if (section === 'Timeline') {
      if (row.key === 'timeline_total') timeline.total = Number(row.value) || 0;
      else if (row.key?.match(/^timeline_\d+$/)) {
        try { timeline.items.push(JSON.parse(row.value)); } catch { /* skip */ }
      }
    }
  }
  return { kpi, funnel, status, followups, orders, refused, attention, refusalCategories, channels, tgFunnel, connection, vkConnection, scan, agents, newLeads, aiSkips, paid, aiUsage, timeline, browserWalk };
}

// вФАвФА Status helpers вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function dotClass(val) {
  if (!val || val === 'missing' || val.startsWith('stale')) return 'dot-warn';
  if (val.startsWith('error')) return 'dot-err';
  if (val.startsWith('ok')) return 'dot-ok';
  return 'dot-unk';
}

function orderBadge(status) {
  const s = (status || '').toLowerCase();
  if (s.includes('–љ–Њ–≤') || s === 'new')  return ['badge-new',  status];
  if (s.includes('—А–∞–±–Њ—В') || s === 'wip') return ['badge-wip', status];
  if (s.includes('–њ–Њ–і—В–≤–µ—А–ґ') || s.includes('confirm') || s.includes('–≥–Њ—В–Њ–≤'))
    return ['badge-done', status];
  if (s.includes('–Њ—В–Ї–∞–Ј') || s === 'declined') return ['badge-no', status];
  return ['badge-gray', status || 'вАФ'];
}

function convChip(status) {
  const s = (status || '').toLowerCase();
  if (s === 'customer') return ['chip-customer', '–Ъ–ї–Є–µ–љ—В рЯОЙ'];
  if (s === 'interested') return ['chip-interested', '–Ш–љ—В–µ—А–µ—Б'];
  if (s === 'no_reply') return ['chip-noreply', '–С–µ–Ј –Њ—В–≤–µ—В–∞'];
  if (s === 'declined') return ['chip-declined', '–Ю—В–Ї–∞–Ј'];
  return ['chip-noreply', s || 'вАФ'];
}

function fmtDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso.length === 10 ? iso + 'T00:00:00' : iso);
    return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
  } catch { return iso.slice(0, 10); }
}

// вФАвФА Order overdue check вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function isOverdue(order) {
  const s = (order.status || '').toLowerCase();
  const waitKw = ['–ґ–і—С—В', '–ґ–і–µ—В', '–Њ–±–µ—Й–∞–ї', 'pending', '–Њ–ґ–Є–і–∞–µ—В'];
  if (!waitKw.some(kw => s.includes(kw))) return false;
  const dateStr = order.date_posted || order.date_event;
  if (!dateStr) return false;
  try {
    let d;
    if (/^\d{2}\.\d{2}\.\d{4}/.test(dateStr)) {
      const [day, month, year] = dateStr.split('.');
      d = new Date(Number(year), Number(month) - 1, Number(day));
    } else {
      d = new Date(dateStr);
    }
    return (Date.now() - d.getTime()) > 2 * 24 * 60 * 60 * 1000;

function _fmtCountdown(sec) {
  if (!sec || sec <= 0) return '<1—Б';
  if (sec < 60) return sec + '—Б';
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  if (m < 60) return s === 0 ? `${m}–Љ` : `${m}–Љ ${s}—Б`;
  const h = Math.floor(m / 60);
  const mm = m % 60;
  return mm === 0 ? `${h}—З` : `${h}—З ${mm}–Љ`;
}

function _fmtAgo(lastCheck) {
  if (!lastCheck || lastCheck === 'вАФ') return '';
  try {
    const d = new Date(lastCheck);
    const mins = Math.round((Date.now() - d.getTime()) / 60000);
    if (mins < 1) return '—В–Њ–ї—М–Ї–Њ —З—В–Њ';
    if (mins < 60) return mins + ' –Љ–Є–љ –љ–∞–Ј–∞–і';
    if (mins < 1440) return Math.round(mins / 60) + ' —З –љ–∞–Ј–∞–і';
    return Math.round(mins / 1440) + ' –і –љ–∞–Ј–∞–і';
  } catch { return lastCheck; }
}

function BrowserWalkCard({ data }) {
  const [expanded, setExpanded] = React.useState(false);
  const [progress, setProgress] = React.useState(null);
  const [requesting, setRequesting] = React.useState(false);
  const [requestedNote, setRequestedNote] = React.useState(null);
  const backendUrl = (typeof CHAT_BACKEND !== 'undefined') ? CHAT_BACKEND : '';

  const leads = data?.leads || 0;
  const refusals = data?.refusals || 0;
  const totalChats = data?.chats || 0;
  const items = data?.items || [];
  const ranAt = data?.ranAt ? new Date(data.ranAt) : null;

  const fmtAgo = (iso) => {
    if (!iso) return '';
    const d = new Date(iso);
    const m = Math.floor((Date.now() - d.getTime()) / 60000);
    if (m < 1) return '—В–Њ–ї—М–Ї–Њ —З—В–Њ';
    if (m < 60) return `${m} –Љ–Є–љ –љ–∞–Ј–∞–і`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h} —З –љ–∞–Ј–∞–і`;
    return `${Math.floor(h/24)} –і–љ –љ–∞–Ј–∞–і`;
  };
  const timeAgo = ranAt ? fmtAgo(ranAt.toISOString()) : '–љ–µ –±—Л–ї–Њ';

  // Poll progress endpoint every 10s (faster 3s while running).
  React.useEffect(() => {
    let cancelled = false;
    const fetchProgress = async () => {
      try {
        const r = await fetch(`${backendUrl}/api/browser_walk_progress`, { cache: 'no-store' });
        if (!r.ok) return;
        const j = await r.json();
        if (!cancelled) setProgress(j);
      } catch { /* offline */ }
    };
    fetchProgress();
    const running = progress && progress.status === 'running';
    const t = setInterval(fetchProgress, running ? 3000 : 10000);
    return () => { cancelled = true; clearInterval(t); };
  }, [backendUrl, progress?.status]);

  const isRunning = progress?.status === 'running';
  const isQueued = progress?.status === 'queued';
  const isDoneFresh = progress?.status === 'done';
  const isError = progress?.status === 'error';
  const scanned = progress?.scanned_chats ?? 0;
  const totalPlan = progress?.total_chats ?? totalChats ?? 18;
  const currentChat = progress?.current_chat || '';
  const startedAt = progress?.started_at || progress?.requested_at;
  const statusAge = fmtAgo(startedAt);
  const freshPosts  = progress?.posts ?? null;
  const freshOrders = progress?.orders ?? null;
  const finishedAt  = progress?.finished_at || '';

  const requestWalk = async (e) => {
    e.stopPropagation();
    if (requesting || isRunning || isQueued) return;
    setRequesting(true);
    try {
      await fetch(`${backendUrl}/api/browser_walk_request`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({source: 'tg', hours: 48}),
      });
      setRequestedNote('–≤ –Њ—З–µ—А–µ–і–Є');
      setTimeout(() => setRequestedNote(null), 6000);
    } catch (err) {
      console.error('[walk] err:', err);
      setRequestedNote('–Њ—И–Є–±–Ї–∞');
      setTimeout(() => setRequestedNote(null), 4000);
    }
    setRequesting(false);
  };

  const valColor = isRunning ? '#3b82f6' : (leads > 0 ? '#fbbf24' : 'var(--text)');
  const pct = totalPlan > 0 ? Math.min(100, Math.round((scanned / totalPlan) * 100)) : 0;

    <div className="kpi-mini" style={{position:'relative'}}>
      <span className="kpi-info" tabIndex="0" aria-label="–Ю–њ–Є—Б–∞–љ–Є–µ"
            onClick={e => e.stopPropagation()}>i</span>
      <div className="kpi-tip">Auto Browser Walk вАФ launchd –Ј–∞–њ—Г—Б–Ї–∞–µ—В –Ї–∞–ґ–і—Л–є —З–∞—Б –≤ :00 SP time —З–µ—А–µ–Ј Claude CLI (Opus 4.7) + Chrome MCP. –Я—А–Њ—Е–Њ–і–Є—В 17 event-—З–∞—В–Њ–≤ –≥–ї–∞–Ј–∞–Љ–Є, —И–ї—С—В –њ–Є—В—З–Є —З–µ—А–µ–Ј Telethon —Б pre-send AI review.</div>

      <div style={{minWidth:0}}>
        {isRunning ? (
          <>
            <div className="kpi-mini-val" style={{color: valColor, fontVariantNumeric:'tabular-nums'}}>
              {scanned}<span style={{fontSize:14, color:'var(--muted)', fontWeight:500}}> / {totalPlan}</span>
              <span style={{fontSize:11, color:'var(--blue)', fontWeight:700, marginLeft:6}}>{pct}%</span>
            </div>
            <div className="kpi-mini-lbl">рЯ§Ц –°–Ї–∞–љ –Є–і—С—В ¬Ј {scanned} –Є–Ј {totalPlan} —З–∞—В–Њ–≤</div>
          </>
        ) : isDoneFresh ? (
          <>
            <div className="kpi-mini-val" style={{color: freshOrders > 0 ? '#fbbf24' : '#10b981', fontVariantNumeric:'tabular-nums'}}>
              {freshOrders ?? 0}
              <span style={{fontSize:11,color:'var(--muted)',fontWeight:500,marginLeft:4}}>
                {freshOrders === 1 ? '–ї–Є–і' : '–ї–Є–і–Њ–≤'} ¬Ј {freshPosts ?? 0} –њ–Њ—Б—В–Њ–≤
              </span>
            </div>
            <div className="kpi-mini-lbl">вЬУ –°–Ї–∞–љ –≥–Њ—В–Њ–≤</div>
          </>
        ) : isError ? (
          <>
            <div className="kpi-mini-val" style={{color:'#ef4444'}}>err</div>
            <div className="kpi-mini-lbl" style={{fontSize:10}}>{String(progress?.error || '').slice(0,32) || '–Њ—И–Є–±–Ї–∞'}</div>

        ) : (

// вФАвФА Funnel pipeline (amoCRM-style) вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
// 6 main stages + 3 branches, computed from dbSnapshot.active / .archived / .pending_drafts.
//
// Stage flow (exclusive assignment by lead status):
//   1. –Э–Њ–≤—Л–µ          вАФ status "–Э–Њ–≤—Л–є"
//   2. –Ю—В–њ—А–∞–≤–Є–ї–Є –њ–Є—В—З вАФ status "–Э–∞–њ–Є—Б–∞–ї"
//     вФФ 2b. –Я–Є—В—З –≤ –±–Њ—В–µ вАФ pending_approvals.json entries with status="pending"
//   3. –Ш–љ—В–µ—А–µ—Б        вАФ status "–Я–µ—А–µ–≥–Њ–≤–Њ—А—Л" (responded, no deep negotiation yet)
//     вФЬ 3b. Follow-up вАФ status "Follow-up" (silent, we pinged)
//     вФФ 3c. –Ю—В–Љ–µ–љ–∞    вАФ status "–Э–µ –∞–Ї—В—Г–∞–ї–µ–љ" (active) + archived "–Э–µ–∞–Ї—В—Г–∞–ї—М–љ–Њ"
//   4. –Я–µ—А–µ–≥–Њ–≤–Њ—А—Л     вАФ status "–Я–µ—А–µ–≥–Њ–≤–Њ—А—Л" with history hints of price/rider discussion
//   5. –Я—А–µ–і–Њ–њ–ї–∞—В–∞     вАФ status "–Ю–Я–Ы–Р–Ґ–Ш–Ы–Р"
//   6. –Ъ–Њ–љ—Ж–µ—А—В        вАФ status "–Ю–њ–ї–∞—З–µ–љ" (post-event, fully closed)
//
// The distinction between stage 3 (–Ш–љ—В–µ—А–µ—Б) and stage 4 (–Я–µ—А–µ–≥–Њ–≤–Њ—А—Л) is:
// both share DB status "–Я–µ—А–µ–≥–Њ–≤–Њ—А—Л" but stage 4 is the subset whose history
// contains commercial keywords (—Ж–µ–љ–∞/–њ—А–∞–є—Б/—А–∞–є–і–µ—А/–±—О–і–ґ–µ—В/–і–µ–њ–Њ–Ј–Є—В/–∞–≤–∞–љ—Б).

const FUNNEL_NEGOTIATION_RE = /—Ж[–µ–µ]–љ[–∞—Л]|–њ—А–∞–є—Б|–њ—А–∞–є—Б–Є–Ї|—А–∞–є–і–µ—А|–±—О–і–ґ–µ—В|–і–µ–њ–Њ–Ј–Є—В|–∞–≤–∞–љ—Б|–њ—А–µ–і–Њ–њ–ї–∞—В|—А–∞—Б—Б—З–Є—В|—Б–Љ–µ—В|—Б–Ї–Є–і–Ї|–і–Њ–≥–Њ–≤–Њ—А|–Ї–Њ–љ—В—А–∞–Ї—В/i;

// Strict drum-show detector: only the CLIENT'S own request should match.
// History is checked only for explicit workflow markers (Vadim / Noize Drum brief),
// so "we pitched drum as extra" doesn't misclassify a regular cover-band lead.
const DRUM_DESC_RE     = /drum[-\s]*show|drum[-\s]*–Ј–∞–±–µ–≥|–±–∞—А–∞–±–∞–љ–љ(?:–Њ–µ|—Л–µ)\s+(?:—И–Њ—Г|–њ—А–µ–і—Б—В–∞–≤–ї–µ–љ|–њ–µ—А—Д–Њ—А–Љ–∞–љ—Б)|–њ–µ—А–Ї—Г—Б—Б–Є–Њ–љ(?:–љ–Њ–µ|–љ—Л–є)/i;
const DRUM_RACE_RE     = /(?:–Ј–∞–±–µ–≥|–Љ–∞—А–∞—Д–Њ–љ)[^.\n]{0,60}–±–∞—А–∞–±–∞–љ/i;
const DRUM_WORKFLOW_RE = /vadimnoize|noize\s*drum|–±—А–Є—Д.{0,30}–≤–∞–і–Є–Љ/i;
// Negation context: negation fragment (–љ–µ –њ—А–µ–і–ї–∞–≥–∞—В—М/–±–µ–Ј/–Є—Б–Ї–ї—О—З–∞—П/–Ї—А–Њ–Љ–µ) –њ–Њ—П–≤–ї—П–µ—В—Б—П
// –≤ –њ—А–µ–і–µ–ї–∞—Е ~80 chars –Ф–Ю –Є–ї–Є –Я–Ю–°–Ы–Х drum-—Д—А–∞–Ј—Л. –Х—Б–ї–Є –і–∞ вАФ –Ї–ї–Є–µ–љ—В –µ–≥–Њ –Ш–°–Ъ–Ы–Ѓ–І–Ш–Ы.
// –Я—А–Є–Љ–µ—А—Л false-positives:
//   ¬Ђ–С—Г–Љ–∞–ґ–љ–Њ–µ —И–Њ—Г, –±–∞—А–∞–±–∞–љ–љ–Њ–µ —И–Њ—Г –Є –Ї–∞–≤–µ—А –≥—А—Г–њ–њ—Г –љ–µ –њ—А–µ–і–ї–∞–≥–∞—В—М¬ї (@nesvetsky 26.06)
//   ¬Ђ–С–∞—А–∞–±–∞–љ–љ–Њ–µ —И–Њ—Г вАФ –љ–µ—В¬ї
//   ¬Ђ–С–µ–Ј drum show¬ї
const NEG_FRAG   = '(?:–љ–µ\\s+(?:–њ—А–µ–і–ї–∞–≥|–љ–∞–і–Њ|–љ—Г–ґ–љ|–Є–љ—В–µ—А–µ—Б–љ)|–±–µ–Ј\\s+|–Є—Б–Ї–ї—О—З|–Ї—А–Њ–Љ–µ\\s+|[вАФ-]\\s*–љ–µ—В\\b)';
const DRUM_WORD  = '(?:drum|–±–∞—А–∞–±–∞–љ|–њ–µ—А–Ї—Г—Б—Б)';
const DRUM_NEG_BEFORE = new RegExp(NEG_FRAG + '[^.\\n]{0,80}' + DRUM_WORD, 'i');
const DRUM_NEG_AFTER  = new RegExp(DRUM_WORD + '\\w*\\s*[^.\\n]{0,80}' + NEG_FRAG, 'i');

function isDrumLead(o) {
  const d = o.desc || '';
  const h = (o.history || '') + ' ' + (o.next_action || '');
  // Explicit negation (before or after drum-word) –≤ desc вЖТ —В–Њ—З–љ–Њ –љ–µ drum-–ї–Є–і
  if (DRUM_NEG_BEFORE.test(d) || DRUM_NEG_AFTER.test(d)) return false;
  return DRUM_DESC_RE.test(d) || DRUM_RACE_RE.test(d) || DRUM_WORKFLOW_RE.test(h);
}

function leadChatUrl(o) {
  // Prefer TG username вЖТ direct t.me link. Fallback: contact URL (could be vk, tg, etc.)
  if (o.username) {
    const u = String(o.username).replace(/^@/, '').trim();
    if (u) return `https://t.me/${u}`;
  }
  const c = o.contact || '';
  if (c.startsWith('http')) return c;
  if (c.startsWith('@')) return `https://t.me/${c.slice(1)}`;
  return '';
}

// computePipeline(active, archived, branchSpec)
// branchSpec is an array of branch descriptors: {key, label, icon, parent, leads, hint?}
// These are appended as branch rows under the main 6 stages.
function computePipeline(allLeads, archived, branchSpec) {
  const active = allLeads || [];
  const arch = archived || [];
  const hasNegotiationText = (o) =>
    FUNNEL_NEGOTIATION_RE.test((o.history || '') + ' ' + (o.desc || ''));
  const st = (o) => (o.status || '').trim();
  const eq = (s) => (o) => st(o).toLowerCase() === s.toLowerCase();
  const any = (re) => (o) => re.test(st(o));

  const stage_new      = active.filter(eq('–Э–Њ–≤—Л–є'));
  const stage_sent     = active.filter(eq('–Э–∞–њ–Є—Б–∞–ї'));
  const neg_all        = active.filter(eq('–Я–µ—А–µ–≥–Њ–≤–Њ—А—Л'));
  const stage_interest = neg_all.filter(o => !hasNegotiationText(o));
  const stage_negot    = neg_all.filter(hasNegotiationText);
  const stage_prepaid  = active.filter(eq('–Ю–Я–Ы–Р–Ґ–Ш–Ы–Р'));
  // Stage 6 ¬Ђ–Ю—В–Ј—Л–≤/–Ї–Њ–љ—В–µ–љ—В¬ї вАФ post-event workflow: –Ї–ї–Є–µ–љ—В –Њ—В—Л–≥—А–∞–ї, –њ—А–Њ—Б–Є–Љ –Њ—В–Ј—Л–≤/—Д–Њ—В–Њ/–≤–Є–і–µ–Њ.
  // DB-—Б—В–∞—В—Г—Б—Л: –Ю–њ–ї–∞—З–µ–љ (fully paid), –Ъ–Њ–љ—Ж–µ—А—В/–°—Л–≥—А–∞–ї/–Т—Л—Б—В—Г–њ–Є–ї (explicit markers),
  // –Ю—В–Ј—Л–≤ (future status when review collected).
  const stage_review   = active.filter(any(/^(–Ю–њ–ї–∞—З–µ–љ|–Ъ–Њ–љ—Ж–µ—А—В|–°—Л–≥—А–∞–ї|–Т—Л—Б—В—Г–њ–Є–ї|–Ю—В–Ј—Л–≤)/i));
  const stage_followup = active.filter(eq('Follow-up'));
  const stage_cancel_active = active.filter(any(/^(–Э–µ –∞–Ї—В—Г–∞–ї|–Ю—В–Ї–∞–Ј|–Ю—В–Љ–µ–љ–∞)/i));
  const stage_cancel_arch   = arch.filter(any(/(–Э–µ–∞–Ї—В—Г–∞–ї|–Э–µ –∞–Ї—В—Г–∞–ї|–Ю—В–Ї–∞–Ј|–Ю—В–Љ–µ–љ–∞)/i));
  const stage_cancel   = [...stage_cancel_active, ...stage_cancel_arch];

  const branches = [];
  (branchSpec || []).forEach(b => branches.push({ ...b, kind: 'branch' }));
  branches.push({ key: 'followup',  label: 'Follow-up', leads: stage_followup, kind: 'branch', parent: 'interest', icon: 'рЯФД' });
  branches.push({ key: 'cancelled', label: '–Ю—В–Љ–µ–љ–∞',    leads: stage_cancel,   kind: 'branch', parent: 'interest', icon: 'вЭМ' });

  return [
    { key: 'new',      label: '–Э–Њ–≤—Л–µ',          leads: stage_new,      kind: 'main' },
    { key: 'sent',     label: '–Ю—В–њ—А–∞–≤–Є–ї–Є –њ–Є—В—З', leads: stage_sent,     kind: 'main' },
    ...branches.filter(b => b.parent === 'sent'),
    { key: 'interest', label: '–Ш–љ—В–µ—А–µ—Б',        leads: stage_interest, kind: 'main' },
    ...branches.filter(b => b.parent === 'interest'),
    { key: 'negot',    label: '–Я–µ—А–µ–≥–Њ–≤–Њ—А—Л',     leads: stage_negot,    kind: 'main' },
    { key: 'prepaid',  label: '–Я—А–µ–і–Њ–њ–ї–∞—В–∞',     leads: stage_prepaid,  kind: 'main' },

function FunnelSection({ title, allLeads, archived, branchSpec }) {
  const [expanded, setExpanded] = React.useState(null);
  // рЯФі 22.04: chat panel on hover/click –і–ї—П –ї–Є–і–Њ–≤ –≤–љ—Г—В—А–Є expanded stage
  const chatCtx = React.useContext(ChatContext);
  const hoverTimer = React.useRef(null);
  const pipeline = React.useMemo(
    () => computePipeline(allLeads, archived, branchSpec),
    [allLeads, archived, branchSpec]
  );
  const hasAnyData =
    (allLeads || []).length > 0 ||
    (archived || []).length > 0 ||
    (branchSpec || []).some(b => (b.leads || []).length > 0);
  if (!hasAnyData) return null;

  const main     = pipeline.filter(s => s.kind === 'main');
  const branches = pipeline.filter(s => s.kind === 'branch');

  const expandedStage = expanded ? pipeline.find(s => s.key === expanded) : null;
  const stageLeads    = expandedStage ? [...expandedStage.leads] : [];
  // Sort by event_date ascending (most urgent first); leads without date at end
  stageLeads.sort((a, b) => {
    const da = a.event_date || '9999-99-99';
    const db = b.event_date || '9999-99-99';
    return da.localeCompare(db);
  });

  return (
    <div id="funnel-section" className="section" style={{ marginTop: 14 }}>
      <div className="section-title">{title || '–Т–Њ—А–Њ–љ–Ї–∞ (TG)'}</div>
      <div className="funnel-wrap">
        {main.map((step, i) => {
          const prev = main[i - 1];
          const n = step.leads.length;
          const pct = prev && prev.leads.length > 0 ? Math.round(n / prev.leads.length * 100) + '%' : null;
          const clickable = n > 0;
          const isActive  = expanded === step.key;
          return (
            <div key={step.key} className="funnel-step" title={PIPELINE_HINTS[step.key] || ''}>
              {i > 0 && <span className="funnel-arr">вАЇ</span>}
              <div
                className={
                  'funnel-box' +
                  (clickable ? ' funnel-box--clickable' : '') +
                  (isActive  ? ' funnel-box--active' : '')
                }
                onClick={() => clickable && setExpanded(isActive ? null : step.key)}
              >
                <div className="funnel-num">{n}</div>
                <div className="funnel-name">{step.label}</div>
                {pct && <div className="funnel-pct">{pct}</div>}
              </div>
            </div>
          );
        })}
      </div>

      {branches.length > 0 && (
        <div className="funnel-branches-wrap">
          {branches.map(br => {
            const n = br.leads.length;
            const clickable = n > 0;
            const isActive  = expanded === br.key;
            const parentLabel = main.find(m => m.key === br.parent)?.label || '';
            return (
              <div
                key={br.key}
                className={
                  'funnel-branch-chip' +
                  (isActive ? ' funnel-branch-chip--active' : '')
                }
                onClick={() => clickable && setExpanded(isActive ? null : br.key)}
                title={PIPELINE_HINTS[br.key] || ''}
                style={{ cursor: clickable ? 'pointer' : 'default', opacity: clickable ? 1 : 0.45 }}
              >
                <span className="funnel-branch-chip-icon">{br.icon}</span>
                <span>{br.label}</span>
                <span className="funnel-branch-chip-num">{n}</span>
                <span className="funnel-branch-chip-parent">¬Ј –Є–Ј ¬Ђ{parentLabel}¬ї</span>
              </div>
            );
          })}
        </div>
      )}

      {expanded && expandedStage && (
        <div className="funnel-expand">
          <div className="funnel-expand-header">
            <span className="funnel-expand-title">
              {expandedStage.label}
              <span className="funnel-expand-count">({stageLeads.length})</span>
            </span>
            <button className="funnel-expand-close" onClick={() => setExpanded(null)}>вЬХ</button>
          </div>
          {stageLeads.length === 0 ? (
            <div className="empty">–Э–µ—В –ї–Є–і–Њ–≤ –љ–∞ —Н—В–Њ–Љ —Н—В–∞–њ–µ</div>
          ) : (
            <div className="funnel-lead-list">
              {stageLeads.map((o, i) => {
                const chatUrl = leadChatUrl(o);
                const name = o.client || o.username || 'вАФ';
                // рЯФі 22.04: hover вЖТ –Њ—В–Ї—А—Л–≤–∞–µ—В –њ–∞–љ–µ–ї—М –њ–µ—А–µ–њ–Є—Б–Ї–Є —Б–њ—А–∞–≤–∞ (–Ї–∞–Ї –≤ ¬Ђ–У–Њ—А—П—З–Є—Е¬ї)
                const uname = (o.username || '').replace(/^@/, '').trim();
                const canChat = !!uname;
                const openChatPanel = () => canChat && chatCtx?.openChat({
                  user_id: null, username: uname, client: o.client || name,
                });
                const onEnter = canChat ? () => {
                  clearTimeout(hoverTimer.current);
                  hoverTimer.current = setTimeout(openChatPanel, 250);
                } : undefined;
                const onLeave = canChat ? () => clearTimeout(hoverTimer.current) : undefined;
                return (
                  <div key={o.id || (o.username + '-' + i)} className="funnel-lead-card"
                       onMouseEnter={onEnter}
                       onMouseLeave={onLeave}
                       onClick={canChat ? (e) => {
                         // –Э–µ –Њ—В–Ї—А—Л–≤–∞—В—М –µ—Б–ї–Є –Ї–ї–Є–Ї –њ–Њ approval-–Ї–љ–Њ–њ–Ї–µ/input/a
                         const tag = (e.target.tagName || '').toLowerCase();
                         if (tag === 'button' || tag === 'textarea' || tag === 'a' || tag === 'input') return;
                         openChatPanel();
                       } : undefined}
                       style={canChat ? {cursor: 'pointer'} : undefined}>
                    <div className="funnel-lead-info">
                      <div className="funnel-lead-name">
                        {name}
                        {/* chip –њ–Њ–Ї–∞–Ј—Л–≤–∞–µ—В –≠–Ґ–Р–Я –≤–Њ—А–Њ–љ–Ї–Є (–Ї—Г–і–∞ –ї–Є–і —А–µ–∞–ї—М–љ–Њ –њ–Њ–њ–∞–ї),
                            –∞ –љ–µ —Б—Л—А–Њ–є DB-—Б—В–∞—В—Г—Б вАФ —З—В–Њ–±—Л –њ—А–Є –њ–µ—А–µ–љ–Њ—Б–µ –ї–Є–і–∞ chip
                            –Њ–±–љ–Њ–≤–ї—П–ї—Б—П –∞–≤—В–Њ–Љ–∞—В–Є—З–µ—Б–Ї–Є. */}
                        {expandedStage.label && (
                          <span className="funnel-lead-status">¬Ј {expandedStage.label}</span>
                        )}
                      </div>
                      <div className="funnel-lead-meta">
                        {o.event_date && <span>рЯУЕ {o.event_date}</span>}
                        {o.location   && <span>рЯУН {o.location}</span>}
                        {o.channel    && <span style={{ color:'var(--gold)' }}>{o.channel}</span>}
                        {o.last_activity && <span>рЯХС {o.last_activity}</span>}
                      </div>
                      {o.desc && (
                        <div className="funnel-lead-desc" title={o.desc}>{o.desc}</div>
                      )}
                      {o.draft && (
                        <div className="funnel-lead-desc" style={{ color:'var(--blue)' }} title={o.draft}>
                          рЯУЭ Draft: {o.draft}
                        </div>
                      )}
                      {/* рЯФі 22.04: approve buttons –њ—А—П–Љ–Њ –≤ –і–∞—И–±–Њ—А–і–µ вАФ –љ–µ –љ–∞–і–Њ –ї–µ–Ј—В—М –≤ –±–Њ—В */}
                      {o.draft && o.id && (o.status === '–Я–Є—В—З –≤ –±–Њ—В–µ' || o.status === 'pending') && (
                        <ApprovalButtons
                          approvalId={o.id}
                          draft={o.draft || ''}
                          username={o.username || ''}
                        />
                      )}
                    </div>
                    {chatUrl ? (
                      <a
                        href={chatUrl}
                        target="_blank"
                        rel="noopener"
                        className="funnel-lead-chat"
                        title={`–Ю—В–Ї—А—Л—В—М TG-—З–∞—В –≤ –љ–Њ–≤–Њ–є –≤–Ї–ї–∞–і–Ї–µ: ${chatUrl}`}
                        onClick={(e) => e.stopPropagation()}
                      >
                        вЖТ
                      </a>
                    ) : (
                      <span className="funnel-lead-chat funnel-lead-chat--disabled" title="–Э–µ—В –Ї–Њ–љ—В–∞–Ї—В–∞">вАФ</span>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// Wrapper: splits leads into LC Band (main) and Drum Show (Noize Drum) pipelines,
// passes appropriate branchSpec to each FunnelSection.
function ApprovalButtons({ approvalId, draft, username }) {
  const [busy, setBusy] = React.useState(false);
  const [status, setStatus] = React.useState(null);  // 'sent' | 'rejected' | 'error:...'
  const [editing, setEditing] = React.useState(false);
  const [editText, setEditText] = React.useState(draft || '');
  const backendUrl = (typeof CHAT_BACKEND !== 'undefined') ? CHAT_BACKEND : '';

  const send = async (overrideText) => {
    if (busy) return;
    setBusy(true);
    try {
      const r = await fetch(`${backendUrl}/api/approval/send`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          approval_id: approvalId,
          override_text: overrideText || undefined,
        }),
      });
      const j = await r.json();
      if (j.ok) {
        setStatus('sent');
        setEditing(false);
      } else {
        setStatus('error:' + (j.error || j.out || '').slice(0, 60));
      }
    } catch (e) {
      setStatus('error:' + String(e).slice(0, 60));
    }
    setBusy(false);
  };

  const reject = async () => {
    if (busy) return;
    if (!confirm('–Ю—В–Ї–ї–Њ–љ–Є—В—М draft?')) return;
    setBusy(true);
    try {
      const r = await fetch(`${backendUrl}/api/approval/reject`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({approval_id: approvalId}),
      });
      const j = await r.json();
      if (j.ok) setStatus('rejected');
      else setStatus('error:' + (j.error || '').slice(0, 60));
    } catch (e) {
      setStatus('error:' + String(e).slice(0, 60));
    }
    setBusy(false);
  };

  if (status === 'sent') {
    return (
      <div style={{marginTop:6, fontSize:11, color:'var(--ok)', fontWeight:700}}>
        вЬЕ –Ю—В–њ—А–∞–≤–ї–µ–љ–Њ {username && `@${username}`} вАФ –Љ–Њ–ґ–љ–Њ –Њ–±–љ–Њ–≤–Є—В—М –і–∞—И–±–Њ—А–і
      </div>
    );
  }
  if (status === 'rejected') {
    return (
      <div style={{marginTop:6, fontSize:11, color:'#f87171', fontWeight:700}}>
        вЭМ –Ю—В–Ї–ї–Њ–љ—С–љ
      </div>
    );
  }
  if (status?.startsWith('error:')) {
    return (
      <div style={{marginTop:6, fontSize:11, color:'#f87171'}}>
        вЭМ {status.slice(6)}
      </div>
    );
  }

  if (editing) {
    return (
      <div style={{marginTop:6, display:'flex', flexDirection:'column', gap:5}}>
        <textarea
          value={editText}
          onChange={e => setEditText(e.target.value)}
          rows={4}
          style={{
            width:'100%', padding:'6px 8px', fontSize:12, lineHeight:1.4,
            background:'rgba(255,255,255,0.04)', color:'var(--text)',
            border:'1px solid var(--border)', borderRadius:5, resize:'vertical',
            fontFamily:'inherit',
          }}
        />
        <div style={{display:'flex', gap:6}}>
          <button
            onClick={() => send(editText)}
            disabled={busy || !editText.trim()}
            style={{
              flex:1, padding:'5px 10px', fontSize:11, fontWeight:600,
              background:'var(--ok)', color:'#0a0a12', border:'none',
              borderRadius:4, cursor: busy ? 'wait' : 'pointer',
            }}
          >{busy ? 'вП≥' : 'вЬЕ –Ю—В–њ—А–∞–≤–Є—В—М —Б –њ—А–∞–≤–Ї–∞–Љ–Є'}</button>
          <button
            onClick={() => { setEditing(false); setEditText(draft || ''); }}
            disabled={busy}
            style={{
              padding:'5px 10px', fontSize:11,
              background:'transparent', color:'var(--muted)',
              border:'1px solid var(--border)', borderRadius:4, cursor:'pointer',
            }}
          >–Ю—В–Љ–µ–љ–∞</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{marginTop:6, display:'flex', gap:5, flexWrap:'wrap'}}>
      <button
        onClick={() => send()}
        disabled={busy}
        style={{
          padding:'4px 10px', fontSize:11, fontWeight:700,
          background:'var(--ok)', color:'#0a0a12', border:'none',
          borderRadius:4, cursor: busy ? 'wait' : 'pointer',
        }}
      >{busy ? 'вП≥ –Ю—В–њ—А–∞–≤–Ї–∞вА¶' : 'вЬЕ –Ю—В–њ—А–∞–≤–Є—В—М'}</button>
      <button
        onClick={() => setEditing(true)}
        disabled={busy}
        style={{
          padding:'4px 10px', fontSize:11, fontWeight:600,
          background:'rgba(96,165,250,0.15)', color:'var(--blue)',
          border:'1px solid rgba(96,165,250,0.4)',
          borderRadius:4, cursor:'pointer',
        }}
      >вЬПпЄП –†–µ–і–∞–Ї—В–Є—А–Њ–≤–∞—В—М</button>
      <button
        onClick={reject}
        disabled={busy}
        style={{
          padding:'4px 10px', fontSize:11, fontWeight:600,
          background:'rgba(248,113,113,0.1)', color:'#f87171',
          border:'1px solid rgba(248,113,113,0.35)',
          borderRadius:4, cursor:'pointer',
        }}
      >вЭМ –Ю—В–Ї–ї–Њ–љ–Є—В—М</button>
    </div>
  );
}


function FunnelSplitSections({ allLeads, archived, pendingDrafts, sessionLog }) {
  const { bandLeads, bandArchived, drumLeads, drumArchived } = React.useMemo(() => {
    const bandL = [], drumL = [], bandA = [], drumA = [];
    (allLeads || []).forEach(o => (isDrumLead(o) ? drumL : bandL).push(o));
    (archived || []).forEach(o => (isDrumLead(o) ? drumA : bandA).push(o));
    return { bandLeads: bandL, bandArchived: bandA, drumLeads: drumL, drumArchived: drumA };
  }, [allLeads, archived]);

  // "–С—А–Є—Д –Т–∞–і–Є–Љ—Г" leads вАФ session_actions where status=awaiting_director,
  // joined with the drum lead (by username) to show real profile info.
  const briefLeads = React.useMemo(() => {
    const items = (sessionLog && sessionLog.items) ? sessionLog.items : [];
    // Latest awaiting_director action per username
    const latest = {};
    items.forEach(it => {
      if (it.status !== 'awaiting_director') return;
      const u = (it.username || '').toLowerCase();
      if (!u) return;
      if (!latest[u] || (it.ts || '') > (latest[u].ts || '')) latest[u] = it;
    });
    // For each awaiting_director username, prefer the DB drum lead; otherwise synthesize from session action.
    const byUsername = {};
    drumLeads.forEach(o => {
      const u = (o.username || '').toLowerCase();
      if (u) byUsername[u] = o;
    });
    return Object.entries(latest).map(([u, sa]) => {
      const dbLead = byUsername[u];
      if (dbLead) {
        // Augment with brief details
        return {
          ...dbLead,
          status: '–С—А–Є—Д –Т–∞–і–Є–Љ—Г',
          last_activity: (sa.ts || '').slice(0, 16).replace('T', ' ') || dbLead.last_activity,
        };
      }
      // Synthesize a minimal lead card from session action
      return {
        username: sa.username,
        client: sa.client || sa.username,
        desc: sa.details || sa.event_type || '',
        event_date: sa.event_date || '',
        location: sa.city || '',
        channel: sa.channel || 'TG',
        status: '–С—А–Є—Д –Т–∞–і–Є–Љ—Г',
        last_activity: (sa.ts || '').slice(0, 16).replace('T', ' '),
      };
    });
  }, [sessionLog, drumLeads]);

  return (
    <>
      <FunnelSection
        title="–Т–Њ—А–Њ–љ–Ї–∞ LC Band (TG)"
        allLeads={bandLeads}
        archived={bandArchived}
        branchSpec={[{
          key: 'bot', label: '–Я–Є—В—З –≤ –±–Њ—В–µ', icon: 'рЯ§Ц', parent: 'sent', leads: pendingDrafts || [],
        }]}
      />
      <FunnelSection
        title="–Т–Њ—А–Њ–љ–Ї–∞ Drum Show (Noize Drum)"
        allLeads={drumLeads}
        archived={drumArchived}
        branchSpec={[{
          key: 'brief', label: '–С—А–Є—Д –Т–∞–і–Є–Љ—Г', icon: 'рЯ•Б', parent: 'sent', leads: briefLeads,
        }]}
      />
    </>
  );
}

function OrderCard({ order: o }) {
  const [cls, txt] = orderBadge(o.status);
  const overdue = isOverdue(o);
  const clientEl = o.username
    ? <a href={`https://t.me/${o.username}`} target="_blank" rel="noopener"
         style={{color:'var(--blue)',textDecoration:'none'}}>{o.client || o.username}</a>
    : (o.client || 'вАФ');
  const descPreview = (o.desc || '').slice(0, 140);
  const hasDetails = !!(o.desc || o.history);
  const historyEntries = (o.history || '')
    .split(/\n(?=\[)/)
    .filter(Boolean)
    .slice(-3);

  const cardRef = React.useRef(null);
  const [tipSide, setTipSide] = React.useState('right');
  React.useLayoutEffect(() => {
    if (!hasDetails) return;
    const card = cardRef.current;
    if (!card) return;
    const compute = () => {
      const r = card.getBoundingClientRect();
      const TIP_W = 440, GAP = 8, MARGIN = 8;
      if (window.innerWidth <= 900) { setTipSide('bottom'); return; }
      if (window.innerWidth - r.right >= TIP_W + GAP + MARGIN) setTipSide('right');
      else if (r.left >= TIP_W + GAP + MARGIN) setTipSide('left');
      else setTipSide('bottom');
    };
    compute();
    window.addEventListener('resize', compute);
    return () => window.removeEventListener('resize', compute);
  }, [hasDetails]);

  return (
    <div
      ref={cardRef}
      className={`order-card order-card-hoverable order-tip-side-${tipSide}${overdue ? ' order-card-overdue' : ''}`}
    >
      <div className="order-info">
        <div className="order-client">
          {clientEl}
          {overdue && <span style={{marginLeft:6,fontSize:10,color:'#f87171',fontWeight:700}}>вЪ† –њ—А–Њ—Б—А–Њ—З–µ–љ–Њ</span>}
        </div>
        <div className="order-meta">
          {o.date_event && <span>рЯУЕ {o.date_event}</span>}
          {o.location   && <span style={{marginLeft:8}}>рЯУН {o.location}</span>}
        </div>
        {descPreview && (
          <div className="order-desc-preview" title={o.desc}>
            рЯТђ {descPreview}{o.desc && o.desc.length > 140 ? 'вА¶' : ''}
          </div>
        )}
      </div>
      <span className={`badge ${cls}`}>{txt || '?'}</span>
      {hasDetails && (
        <div className="order-tip">
          {o.desc && (
            <>
              <div className="order-tip-label">–Ш–Ј–љ–∞—З–∞–ї—М–љ—Л–є –Ј–∞–њ—А–Њ—Б</div>
              <div className="order-tip-body">{o.desc}</div>
            </>
          )}
          {historyEntries.length > 0 && (
            <>
              <div className="order-tip-label" style={{marginTop:8}}>–Я–µ—А–µ–њ–Є—Б–Ї–∞ (–њ–Њ—Б–ї–µ–і–љ–Є–µ {historyEntries.length})</div>
              <div className="order-tip-body order-tip-history">
                {historyEntries.map((e, i) => (
                  <div key={i} className="order-tip-hist-line">{e.trim()}</div>
                ))}
              </div>

          {o.source_chat && (
            <div style={{marginTop:8, fontSize:10, color:'var(--muted)'}}>
              –Ш—Б—В–Њ—З–љ–Є–Ї: {o.source_chat}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function ScanStatus({ scan }) {
  if (!scan || scan.status === 'idle') return null;

  const isActive = scan.status === 'scanning';
  const needsPerm = scan.status === 'needs_permission';
  const isDone = scan.status === 'done';
  const isError = scan.status === 'error';

  const cardClass = needsPerm ? 'scan-card scan-card-permission'
    : isError ? 'scan-card scan-card-error'
    : isDone ? 'scan-card scan-card-done'
    : isActive ? 'scan-card scan-card-active'
    : 'scan-card';

  const statusEmoji = needsPerm ? 'вЪ†пЄП' : isError ? 'вЭМ' : isDone ? 'вЬЕ' : 'рЯФН';
  const statusLabel = needsPerm ? '–Ґ—А–µ–±—Г–µ—В—Б—П —А–∞–Ј—А–µ—И–µ–љ–Є–µ'
    : isError ? '–Ю—И–Є–±–Ї–∞'
    : isDone ? '–°–Ї–∞–љ–Є—А–Њ–≤–∞–љ–Є–µ –Ј–∞–≤–µ—А—И–µ–љ–Њ'
    : '–°–Ї–∞–љ–Є—А–Њ–≤–∞–љ–Є–µ...';

  const statusColor = needsPerm || isError ? '#f87171' : isDone ? 'var(--ok)' : 'var(--gold)';

  let timeAgo = '';
  if (scan.updated) {
    try {
      const d = new Date(scan.updated);
      const mins = Math.round((Date.now() - d.getTime()) / 60000);
      if (mins < 1) timeAgo = '—В–Њ–ї—М–Ї–Њ —З—В–Њ';
      else if (mins < 60) timeAgo = mins + ' –Љ–Є–љ –љ–∞–Ј–∞–і';
      else timeAgo = Math.round(mins / 60) + ' —З –љ–∞–Ј–∞–і';
    } catch { timeAgo = ''; }
  }

  return (
    <div className="section" style={{ marginTop: 14 }}>
      <div className="section-title">TG –°–Ї–∞–љ–Є—А–Њ–≤–∞–љ–Є–µ</div>
      <div className={cardClass}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:14,fontWeight:700,color:statusColor}}>
            {statusEmoji} {statusLabel}
          </div>
          {timeAgo && <div style={{fontSize:10,color:'var(--muted)'}}>{timeAgo}</div>}
        </div>

        {scan.message && (
          <div style={{fontSize:12,color:'var(--text)',marginTop:6,lineHeight:1.4}}>{scan.message}</div>
        )}

        {isActive && (
          <div className="scan-progress-bar">
            <div className="scan-progress-fill" style={{width: scan.progress + '%'}} />
          </div>
        )}
        {isActive && (
          <div style={{fontSize:11,color:'var(--muted)',textAlign:'right'}}>{scan.progress}%</div>
        )}

        {scan.chatsChecked && scan.chatsChecked.length > 0 && (() => {
          const totalPosts = scan.chatsChecked.reduce((a, c) => a + (Number(c.posts) || 0), 0);
          return (
            <div style={{marginTop:8,padding:'6px 8px',background:'rgba(255,255,255,0.03)',borderRadius:6,fontSize:10,color:'var(--muted)'}}>
              <div style={{fontWeight:700,textTransform:'uppercase',letterSpacing:'1.2px',marginBottom:4}}>
                –Я—А–Њ–≤–µ—А–µ–љ–Њ: {scan.chatsChecked.length} {scan.chatsChecked.length === 1 ? '—З–∞—В' : '—З–∞—В–Њ–≤'} ¬Ј {totalPosts} –њ–Њ—Б—В–Њ–≤
              </div>
              {scan.chatsChecked.map((c, i) => (
                <div key={i} style={{display:'flex',gap:6,flexWrap:'wrap',lineHeight:1.5}}>
                  <span style={{color:'var(--text)'}}>{c.chat || 'вАФ'}</span>
                  <span>¬Ј {c.posts || 0} –њ–Њ—Б—В–Њ–≤</span>
                  {c.period_from && c.period_to && <span>¬Ј {c.period_from}вАУ{c.period_to}</span>}
                </div>
              ))}
            </div>
          );
        })()}

        {scan.results && scan.results.length > 0 && (
          <div style={{marginTop:8}}>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'1.2px',color:'var(--muted)',marginBottom:4}}>
              –Э–∞–є–і–µ–љ–Њ –Ј–∞—П–≤–Њ–Ї: {scan.results.length}
            </div>
            {scan.results.map((r, i) => {
              // Build a Telegram Web link that opens the chat directly.
              // Priority: explicit post_link > @username (contact/link) > chat-source @username > source chat name map.
              const chatNameMap = {
                'Event Family': 'EventFamily',
                'EventFamily': 'EventFamily',
                'Event Russia': 'Event_Russian',
                'Event_Russian': 'Event_Russian',
                'Event Area': 'event_area',
                'event_area': 'event_area',
                'Event People': 'eventori',
                'eventori': 'eventori',
                'Event hunter': 'mskeventjob',
                'mskeventjob': 'mskeventjob',
                'myeventhunter': 'myeventhunter',
                'Bigfinger': 'bigfingerchat',
                'bigfingerchat': 'bigfingerchat',
                'eventchatrussia': 'eventchatrussia',
                'Event –Ь–µ—А–Њ–њ—А–Є—П—В–Є—П': 'eventchatrussia',
              };
              const unameMatch = (r.contact || '').match(/@([A-Za-z0-9_]+)/)
                || (r.link || '').match(/t\.me\/([A-Za-z0-9_]+)/)
                || (r.chat || '').match(/@([A-Za-z0-9_]+)/);
              let uname = unameMatch && unameMatch[1];
              // Fallback: use chat-name map when contact is "–≤ –Ы–°" and link empty
              if (!uname && r.chat) {
                for (const [k, v] of Object.entries(chatNameMap)) {
                  if (r.chat.toLowerCase().includes(k.toLowerCase())) { uname = v; break; }
                }
              }
              // tg://resolve?domain=X opens Telegram Desktop DIRECTLY to the DM with that user.
              // Fallback: https://t.me/X for leads without explicit uname (Telegram Desktop handles it too).
              const tgLink = uname
                ? `tg://resolve?domain=${uname}`
                : r.post_link
                  ? r.post_link
                  : null;
              // If we fell back to source chat, adjust label
              const contactIsDM = (r.contact || '').trim() === '–≤ –Ы–°';
              const linkLabel = contactIsDM && uname && !unameMatch
                ? `вЖТ —З–∞—В @${uname}`
                : null;
              return (
              <div key={i} className="scan-result-item"
                onClick={() => tgLink && window.open(tgLink, '_blank')}
                style={{cursor: tgLink ? 'pointer' : 'default'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <span style={{color:'var(--gold)',marginRight:6}}>вАҐ</span>
                    {tgLink
                      ? <a href={tgLink} target="_blank" rel="noopener" style={{color:'var(--blue)',textDecoration:'none',fontWeight:700}}>{r.who || 'вАФ'}</a>
                      : <strong>{r.who || 'вАФ'}</strong>
                    }
                    {r.contact && (tgLink && uname
                      ? <a href={tgLink} style={{color:'var(--blue)',fontSize:10,marginLeft:4,textDecoration:'none'}} onClick={e=>e.stopPropagation()}>рЯТђ {r.contact}</a>
                      : <span style={{color:'var(--muted)',fontSize:10,marginLeft:4}}>{r.contact}</span>
                    )}
                    {linkLabel && <span style={{color:'var(--blue)',fontSize:10,marginLeft:6}}>{linkLabel}</span>}
                  </div>
                  {r.note && <span style={{color:'#f87171',fontSize:9,fontWeight:700,flexShrink:0}}>вЪ† {r.note}</span>}
                </div>
                <div style={{marginTop:2}}>{r.what || 'вАФ'}</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:4,fontSize:10,color:'var(--muted)'}}>
                  {r.event_date && <span>рЯУЕ –°–Њ–±—Л—В–Є–µ: {r.event_date}</span>}
                  {r.post_date && <span>вЬЙ –Я–Њ—Б—В: {r.post_date}</span>}
                  {r.budget && r.budget !== '–љ–µ —Г–Ї–∞–Ј–∞–љ' && <span style={{color:'var(--ok)'}}>рЯТ∞ {r.budget}</span>}
                  {r.post_link && !r.post_link.includes('@') && <a href={tgLink} target="_blank" rel="noopener" style={{color:'var(--blue)'}}>вЖТ –Њ—В–Ї—А—Л—В—М –њ–Њ—Б—В</a>}
                </div>
              </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function StatusSection({ status, activity24h, onProcessClick }) {
  const [bwExpanded, setBwExpanded] = React.useState(false);
  const [bwFeed, setBwFeed] = React.useState(null);
  const backendUrl = (typeof CHAT_BACKEND !== 'undefined') ? CHAT_BACKEND : '';

  React.useEffect(() => {
    if (!bwExpanded) return;
    let cancelled = false;
    const fetchFeed = async () => {
      try {
        const r = await fetch(`${backendUrl}/api/browser_walk_progress`, { cache: 'no-store' });
        if (!r.ok) return;
        const j = await r.json();
        if (!cancelled) setBwFeed(j);
      } catch { /* offline */ }
    };
    fetchFeed();
    const t = setInterval(fetchFeed, 3000);
    return () => { cancelled = true; clearInterval(t); };
  }, [bwExpanded, backendUrl]);

  if (!status.length) return null;
  const act = activity24h || {};

  // Browser Walk row вАФ –њ—А–µ–і–њ–Њ—З–Є—В–∞–µ–Љ row –Є–Ј Google Sheet (sync_dashboard_data.py),
  // –њ–Њ—В–Њ–Љ—Г —З—В–Њ –Њ–љ —Г–ґ–µ —Б—В–Њ–Є—В –≤ –њ—А–∞–≤–Є–ї—М–љ–Њ–є –њ–Њ–Ј–Є—Ж–Є–Є (–њ–Њ—Б–ї–µ TG Monitor).
  // –Х—Б–ї–Є Sheet-row –љ–µ—В (–љ–∞ –≤—Б—П–Ї–Є–є —Б–ї—Г—З–∞–є) вАФ —Б–Є–љ—В–µ–Ј–Є—А—Г–µ–Љ.
  // рЯФі 21.04 —Д–Є–Ї—Б –і—Г–±–ї—П: —А–∞–љ—М—И–µ PUSH'–Є–ї–Є –µ—Й—С –Њ–і–љ—Г —Б—В—А–Њ–Ї—Г вАФ –њ–Њ–ї—Г—З–∞–ї–Є 2 Browser Walk'–∞

      reason: '',

          <span style={{
            marginLeft:'auto', fontSize:11, color:'var(--muted)', fontWeight:500,
          }}>рЯ§Ц {act._ai_calls_24h.count} AI-–≤—Л–Ј–Њ–≤–Њ–≤ / 24—З</span>
        )}
      </div>
      <div className="status-list">
        {rows.map(s => {

function TGFunnelModal({ tgFunnel, onClose }) {
  const [period, setPeriod] = useState('week');
  const periods = [
    { key: 'day',   label: '–Ф–µ–љ—М' },
    { key: 'week',  label: '–Э–µ–і–µ–ї—П' },
    { key: 'month', label: '–Ь–µ—Б—П—Ж' },
    { key: 'year',  label: '–У–Њ–і' },
  ];
  const cur    = tgFunnel[period] || { sent: 0, leads: 0, paid: 0, earned: 0 };
  const maxVal = Math.max(cur.sent || 1, 1);
  const steps  = [
    { key: 'sent',  label: '–Ю—В–њ—А–∞–≤–ї–µ–љ–Њ –Њ—В–≤–µ—В–Њ–≤',  val: cur.sent,  color: '#3b82f6' },
    { key: 'leads', label: '–Ы–Є–і—Л (Customer TG)',  val: cur.leads, color: '#f5c518' },
    { key: 'paid',  label: '–Ю–њ–ї–∞—В–Є–ї–Є',            val: cur.paid,  color: '#10b981' },
  ];
  const hasData = Object.keys(tgFunnel).length > 0;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()}>
        <div className="modal-handle" />
        <div className="modal-header">
          <div className="modal-title">TG –Т–Њ—А–Њ–љ–Ї–∞</div>
          <button className="modal-close" onClick={onClose}>вЬХ</button>
        </div>
        <div className="period-tabs">
          {periods.map(p => (
            <button
              key={p.key}
              className={'period-tab' + (period === p.key ? ' active' : '')}
              onClick={() => setPeriod(p.key)}
            >{p.label}</button>
          ))}
        </div>
        <div className="tg-funnel-list">
          {steps.map((step, i) => {
            const prev = steps[i - 1];
            const conv = prev && prev.val > 0
              ? Math.round(step.val / prev.val * 100) + '%'
              : null;
            const barW = Math.max(8, Math.round(step.val / maxVal * 100));
            return (
              <div key={step.key} className="tg-funnel-item">
                <div className="tg-funnel-item-header">
                  <span className="tg-funnel-item-label">{step.label}</span>
                  {conv && i > 0 && <span className="tg-funnel-item-conv">{conv}</span>}
                </div>
                <div className="tg-funnel-bar-track">
                  <div
                    className="tg-funnel-bar-fill"
                    style={{ width: barW + '%', background: step.color }}
                  >
                    <span className="tg-funnel-bar-num">{step.val}</span>
                  </div>
                </div>
              </div>
            );
          })}
          <div className="tg-earned-row">
            <span className="tg-earned-label">–Ч–∞—А–∞–±–Њ—В–∞–љ–Њ</span>
            <span className="tg-earned-val">
              {cur.earned > 0 ? cur.earned.toLocaleString('ru-RU') + '\u00a0вВљ' : 'вАФ'}
            </span>
          </div>
        </div>
        {!hasData && (
          <div style={{marginTop:14, fontSize:11, color:'var(--muted)', textAlign:'center'}}>
            –Ч–∞–њ—Г—Б—В–Є—В–µ sync_dashboard_data.py –і–ї—П –Њ–±–љ–Њ–≤–ї–µ–љ–Є—П –і–∞–љ–љ—Л—Е
          </div>
        )}

    </div>
  );
}

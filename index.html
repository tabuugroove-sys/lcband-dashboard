// вФАвФА Processes (launchd agents) with SLA вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function ProcessesSection({ agents }) {
  const fmtInterval = (sec) => {
    if (!sec) return '–њ–Њ—Б—В–Њ—П–љ–љ–Њ';
    if (sec < 60) return `${sec}—Б`;
    if (sec < 3600) return `${Math.round(sec/60)}–Љ`;
    return `${Math.round(sec/3600)}—З`;
  };
  const fmtMinsAgo = (m) => {
    if (m == null) return 'вАФ';
    if (m < 1) return '—В–Њ–ї—М–Ї–Њ —З—В–Њ';
    if (m < 60) return `${m}–Љ –љ–∞–Ј–∞–і`;
    if (m < 1440) return `${Math.round(m/60)}—З –љ–∞–Ј–∞–і`;
    return `${Math.round(m/1440)}–і –љ–∞–Ј–∞–і`;
  };
  const stateColor = (st) => {
    if (st === 'running')   return { dot:'#10b981', label:'—А–∞–±–Њ—В–∞–µ—В',   bg:'rgba(16,185,129,0.1)' };
    if (st === 'not')       return { dot:'#f5c518', label:'–ґ–і—С—В',       bg:'rgba(245,197,24,0.08)' };
    if (st === 'missing')   return { dot:'#f87171', label:'–Э–Х –Т LAUNCHCTL', bg:'rgba(248,113,113,0.15)' };
    if (st === 'error')     return { dot:'#f87171', label:'–Њ—И–Є–±–Ї–∞',     bg:'rgba(248,113,113,0.15)' };
    return { dot:'#6b7280', label: st || '?', bg:'rgba(107,114,128,0.1)' };
  };
  const slaColor = (sla) => {
    if (sla === 'green')    return '#10b981';
    if (sla === 'yellow')   return '#f5c518';
    if (sla === 'red')      return '#f87171';
    if (sla === 'sleeping') return '#60a5fa';  // —Б–Є–љ–Є–є вАФ —И—В–∞—В–љ—Л–є —Б–Њ–љ
    return 'var(--muted)';
  };
  return (
    <div className="section" style={{ marginTop: 14 }}>
      <div className="section-title">рЯЫ°пЄП –Я—А–Њ—Ж–µ—Б—Б—Л (launchd)</div>
      <div style={{display:'flex',gap:16,padding:'4px 0',fontSize:12,color:'var(--muted)',marginBottom:10,flexWrap:'wrap'}}>
        <span>–Т—Б–µ–≥–Њ: <b style={{color:'var(--text)'}}>{agents.total}</b></span>
        <span>вЧП <b style={{color:'#10b981'}}>{agents.running}</b> —А–∞–±–Њ—В–∞–µ—В</span>
        {agents.missing > 0 && <span>вЪ†пЄП <b style={{color:'#f87171'}}>{agents.missing}</b> –љ–µ –≤ launchctl</span>}
        {agents.staleSla > 0 && <span>вП±пЄП <b style={{color:'#f5c518'}}>{agents.staleSla}</b> SLA –њ—А–Њ—Б—А–Њ—З–µ–љ</span>}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {(agents.items || []).map((a, i) => {
          const sc = stateColor(a.state);
          const okExit = a.last_exit === '0' || a.last_exit === '(never exited)' || !a.last_exit;
          const slaCol = slaColor(a.sla);
          return (
            <div key={i} style={{
              padding:'8px 12px',
              background: sc.bg,
              borderRadius: 8,
              border: `1px solid ${a.sla === 'red' ? '#f87171' : 'var(--border)'}`,
              display: 'flex',
              alignItems: 'center',
              gap: 10,
            }}>
              <span style={{
                width:8,height:8,borderRadius:'50%',
                background: sc.dot,
                boxShadow: a.state === 'running' ? `0 0 6px ${sc.dot}` : 'none',
                flexShrink:0,
              }} />
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                  {a.desc}
                </div>
                <div style={{fontSize:10,color:'var(--muted)',marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                  <span style={{fontFamily:'monospace'}}>{a.label.replace('com.lcband.','')}</span>
                  <span style={{marginLeft:8}}>
                    ¬Ј {a.note ? a.note : `–Ї–∞–ґ–і—Л–µ ${fmtInterval(a.interval)}`}
                  </span>
                  {a.minutes_since_success != null && (
                    <span style={{marginLeft:8,color:slaCol,fontWeight:600}}>
                      ¬Ј —Г—Б–њ–µ—Е {fmtMinsAgo(a.minutes_since_success)}
                      {a.sla === 'sleeping' && ' рЯТ§'}
                    </span>
                  )}
                  {!okExit && <span style={{marginLeft:8,color:'#f87171'}}>¬Ј exit {a.last_exit}</span>}
                </div>
              </div>
              <span style={{
                fontSize:10,fontWeight:700,
                padding:'2px 8px',borderRadius:10,
                background:'rgba(0,0,0,0.25)',
                color:sc.dot,
                whiteSpace:'nowrap',
              }}>
                {sc.label.toUpperCase()}
              </span>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:12,padding:10,background:'rgba(59,130,246,0.08)',borderRadius:8,fontSize:11,color:'var(--muted)'}}>
        рЯТ° Watchdog –Ї–∞–ґ–і—Л–µ 30 –Љ–Є–љ—Г—В –њ—А–Њ–≤–µ—А—П–µ—В. SLA: рЯЯҐ –Ј–µ–ї—С–љ—Л–є –≤ –њ—А–µ–і–µ–ї–∞—Е 2√Ч –Є–љ—В–µ—А–≤–∞–ї–∞, рЯЯ° –ґ—С–ї—В—Л–є –њ—А–Њ—Б—А–Њ—З–µ–љ, рЯФі –Ї—А–∞—Б–љ—Л–є &gt; 5√Ч –Є–љ—В–µ—А–≤–∞–ї–∞, рЯФµ —Б–Є–љ–Є–є ¬Ђ—Б–њ–Є—В¬ї (–њ–Њ —А–∞—Б–њ–Є—Б–∞–љ–Є—О).
      </div>
    </div>
  );
}

// вФАвФА Timeline вАФ —Б–Њ–±—Л—В–Є—П –і–љ—П вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function TimelineSection({ timeline }) {
  const items = timeline.items || [];
  const fmtTs = (iso) => {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      return `${h}:${m}`;
    } catch { return iso.slice(11, 16); }
  };
  const kindStyle = (kind) => {
    const map = {
      'ai_call':   { emoji: 'рЯ§Ц', color: '#60a5fa', label: 'LLM' },
      'ai_skip':   { emoji: 'вЭМ', color: '#f87171', label: 'AI-SKIP' },
      'ai_adapt':  { emoji: 'вЬПпЄП', color: '#a78bfa', label: 'ADAPT' },
      'sent':      { emoji: 'рЯУ§', color: '#10b981', label: '–Ю–Ґ–Я–†–Р–Т–Ы–Х–Э–Ю' },
      'error':     { emoji: 'вЪ†пЄП', color: '#f87171', label: '–Ю–®–Ш–С–Ъ–Р' },
    };
    return map[kind] || { emoji: '¬Ј', color: 'var(--muted)', label: kind };
  };
  if (items.length === 0) {
    return (
      <div className="section" style={{ marginTop: 14 }}>
        <div className="section-title">рЯХТ –Ґ–∞–є–Љ–ї–∞–є–љ —Б–µ–≥–Њ–і–љ—П</div>
        <div style={{padding:20,textAlign:'center',color:'var(--muted)',fontSize:13}}>
          –°–µ–≥–Њ–і–љ—П —Б–Њ–±—Л—В–Є–є –µ—Й—С –љ–µ—В. LLM-–≤—Л–Ј–Њ–≤—Л, –Њ—В–њ—А–∞–≤–Ї–Є –Є AI-—А–µ—И–µ–љ–Є—П –±—Г–і—Г—В –њ–Њ—П–≤–ї—П—В—М—Б—П –Ј–і–µ—Б—М.
        </div>
      </div>
    );
  }
  return (
    <div className="section" style={{ marginTop: 14 }}>
      <div className="section-title">рЯХТ –Ґ–∞–є–Љ–ї–∞–є–љ —Б–µ–≥–Њ–і–љ—П ({timeline.total})</div>
      <div style={{display:'flex',flexDirection:'column',gap:4}}>
        {items.map((ev, i) => {
          const s = kindStyle(ev.kind);
          return (
            <div key={i} style={{
              display:'flex', alignItems:'flex-start', gap:10,
              padding:'6px 10px',
              background: 'rgba(255,255,255,0.02)',
              borderLeft: `3px solid ${s.color}`,
              borderRadius: 4,
            }}>
              <span style={{fontSize:10,color:'var(--muted)',fontFamily:'monospace',flexShrink:0,minWidth:40}}>
                {fmtTs(ev.ts)}
              </span>
              <span style={{fontSize:14,flexShrink:0}}>{s.emoji}</span>
              <div style={{flex:1,minWidth:0,fontSize:12}}>
                <span style={{color:s.color,fontWeight:700,marginRight:6}}>{s.label}</span>
                {ev.purpose && <span style={{color:'var(--muted)',fontSize:10,marginRight:6}}>[{ev.purpose}]</span>}
                {ev.username && <span style={{fontFamily:'monospace'}}>@{ev.username}</span>}
                {ev.decision && <span style={{marginLeft:6,color:'var(--muted)'}}>вЖТ {ev.decision}</span>}
                {ev.reason && <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>{ev.reason.slice(0,200)}</div>}
                {ev.context && !ev.reason && <div style={{fontSize:10,color:'var(--muted)',marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{String(ev.context).slice(0,200)}</div>}
                {ev.cost_usd > 0 && <span style={{marginLeft:6,fontSize:10,color:'#f5c518'}}>${ev.cost_usd.toFixed(5)}</span>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

          <div style={{padding:10,background:'rgba(248,113,113,0.08)',borderRadius:8,textAlign:'center'}}>
            <div style={{fontSize:22,fontWeight:700,color:'#f87171'}}>{aiUsage.skip}</div>

(async () => {
  if (CHAT_BACKEND === '') return;
  try {
    const r = await fetch('./backend_url.json', { cache: 'no-store' });
    if (!r.ok) return;
    const j = await r.json();
    if (j && typeof j.url === 'string' && /^https:\/\//.test(j.url)) {
      CHAT_BACKEND = j.url;
    }
  } catch { /* leave fallback */ }
})();
const ChatContext = React.createContext(null);

// we don't re-download a conversation the user already looked at.
const CHAT_CACHE = new Map();

function ChatPanel({ target, onClose }) {
  const [data, setData] = useState(null);
  const [err, setErr]   = useState('');
  const [draft, setDraft] = useState('');
  const [sending, setSending] = useState(false);
  const bodyRef = React.useRef(null);
  const abortRef = React.useRef(null);

  const q = target?.username || (target?.user_id ? String(target.user_id) : '');

  const fetchChat = useCallback(async (sinceId) => {
    if (!q) return;
    // Abort any previous in-flight fetch so responses for a DIFFERENT chat
    // (user hovered another card) don't land here and corrupt the panel.
    if (abortRef.current) abortRef.current.abort();
    const ctrl = new AbortController();
    abortRef.current = ctrl;
    const activeQ = q;
    const url = sinceId
      ? `${CHAT_BACKEND}/api/chat?q=${encodeURIComponent(q)}&since_id=${sinceId}`
      : `${CHAT_BACKEND}/api/chat?q=${encodeURIComponent(q)}&limit=40`;
    try {
      const r = await fetch(url, { signal: ctrl.signal });
      const j = await r.json();
      // If the user hovered another card while we were waiting, drop the response.
      if (activeQ !== q) return;
      if (j.error) { setErr(j.error); return; }
      setErr('');
      if (j.incremental) {
        // Merge new messages onto cached set (dedupe by id).
        const prev = CHAT_CACHE.get(activeQ) || data || { messages: [], meta: j.meta };
        const seen = new Set(prev.messages.map(m => m.id));
        const merged = prev.messages.concat(j.messages.filter(m => !seen.has(m.id)));
        const next = { meta: prev.meta || j.meta, messages: merged };
        CHAT_CACHE.set(activeQ, next);
        setData(next);
      } else {
        CHAT_CACHE.set(activeQ, { meta: j.meta, messages: j.messages });
        setData({ meta: j.meta, messages: j.messages });
      }
    } catch (e) {
      if (e.name === 'AbortError') return;
      setErr(`Backend –љ–µ –Њ—В–≤–µ—З–∞–µ—В (${e.message}). –Ч–∞–њ—Г—Б—В–Є dashboard_backend.py.`);
    }
  }, [q, data]);

  useEffect(() => {
    if (!target) return;
    setErr(''); setDraft('');
    // Instant paint from cache (if we've seen this chat before), then request
    // only the tail (messages newer than what's cached).
    const cached = CHAT_CACHE.get(q);
    if (cached) {
      setData(cached);
      const lastId = cached.messages.length ? cached.messages[cached.messages.length - 1].id : 0;
      fetchChat(lastId);
    } else {
      setData(null);
      fetchChat();
    }
    // Autorefresh вАФ incremental only, cheap on backend.
    const id = setInterval(() => {
      const c = CHAT_CACHE.get(q);
      const lastId = c && c.messages.length ? c.messages[c.messages.length - 1].id : 0;
      fetchChat(lastId || undefined);
    }, 15000);
    return () => {
      clearInterval(id);
      if (abortRef.current) abortRef.current.abort();
    };
  }, [target]);   // intentionally NOT depending on fetchChat вАФ avoid reset loops

  useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [data]);

  const send = async () => {
    const text = draft.trim();
    if (!text || sending) return;
    setSending(true); setErr('');
    try {
      const r = await fetch(`${CHAT_BACKEND}/api/send`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ q, text }),
      });
      const j = await r.json();
      if (j.error) setErr(j.error);
      else {
        setDraft('');
        const c = CHAT_CACHE.get(q);
        const lastId = c && c.messages.length ? c.messages[c.messages.length - 1].id : 0;
        fetchChat(lastId || undefined);
      }
    } catch (e) {
      setErr(e.message);
    } finally {
      setSending(false);
    }
  };

  const onKey = e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); send(); }
    if (e.key === 'Escape') onClose();
  };

  const fmt = iso => {
    try { return new Date(iso).toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }); }
    catch { return ''; }
  };

  const meta = data?.meta;
  const title = meta
    ? `${meta.first_name || ''} ${meta.last_name || ''}`.trim() || (meta.username ? `@${meta.username}` : `id${meta.user_id}`)
    : (target.client || `@${target.username}` || `id${target.user_id}`);
  const sub = meta?.username ? `@${meta.username}` : (target.username ? `@${target.username}` : '');

  return (
    <div className={`chat-panel ${target ? 'open' : ''}`}>
      <div className="chat-header">
        <div>
          <div className="chat-title">{title}</div>
          {sub && <div className="chat-sub">{sub}</div>}
        </div>
        <button className="chat-close" onClick={onClose} title="–Ч–∞–Ї—А—Л—В—М (Esc)">√Ч</button>
      </div>
      {err && <div className="chat-error">{err}</div>}
      <div className="chat-body" ref={bodyRef}>
        {!data && !err && <div className="chat-loading">–Ч–∞–≥—А—Г–ґ–∞—О –њ–µ—А–µ–њ–Є—Б–Ї—ГвА¶</div>}
        {data?.messages?.length === 0 && <div className="chat-loading">–Э–µ—В —Б–Њ–Њ–±—Й–µ–љ–Є–є</div>}
        {data?.messages?.map(m => (
          <div key={m.id} style={{display:'flex', flexDirection:'column', alignItems: m.out ? 'flex-end' : 'flex-start'}}>
            <div className={`chat-msg ${m.out ? 'chat-msg-out' : 'chat-msg-in'}`}>
              {m.text || (m.media ? 'рЯУО –Љ–µ–і–Є–∞' : '')}
            </div>
            <div className="chat-msg-time">{fmt(m.date)}</div>
          </div>
        ))}
      </div>
      <div className="chat-input-row">
        <textarea
          className="chat-input"
          placeholder="–Ю—В–≤–µ—В –Ї–ї–Є–µ–љ—В—ГвА¶ (Ctrl+Enter вАФ –Њ—В–њ—А–∞–≤–Є—В—М, Esc вАФ –Ј–∞–Ї—А—Л—В—М)"
          value={draft}
          onChange={e => setDraft(e.target.value)}
          onKeyDown={onKey}
          rows={2}
        />
        <button className="chat-send" onClick={send} disabled={sending || !draft.trim()}>
          {sending ? 'вА¶' : 'вЮ§'}
        </button>
      </div>
    </div>
  );
}

  const [showProcess, setShowProcess] = useState(null);
  const [chatTarget, setChatTarget] = useState(null);
  const [aiTags, setAiTags] = useState({});
  const [aiLoading, setAiLoading] = useState(false);
  const [activeTab, setActiveTab] = useState(() => {
    try { return localStorage.getItem('lcb_tab') || 'overview'; } catch { return 'overview'; }
  });
  useEffect(() => {
    try { localStorage.setItem('lcb_tab', activeTab); } catch {}
  }, [activeTab]);

  // –Э–∞ –і–µ—Б–Ї—В–Њ–њ–µ –њ—А–Є –Њ—В–Ї—А—Л—В–Њ–Љ —З–∞—В–µ —Б–і–≤–Є–≥–∞–µ–Љ .app —В–∞–Ї, —З—В–Њ–±—Л –њ—А–∞–≤–∞—П –≥—А–∞–љ–Є—Ж–∞
  // —Г–њ–Є—А–∞–ї–∞—Б—М –≤ –ї–µ–≤—Л–є –Ї—А–∞–є —Б–ї–∞–є–і-–њ–∞–љ–µ–ї–Є (440px)
  useEffect(() => {
    document.body.classList.toggle('chat-open', !!chatTarget);
    return () => document.body.classList.remove('chat-open');
  }, [chatTarget]);

  useEffect(() => {
    const on  = () => setOffline(false);
    const off = () => setOffline(true);
    window.addEventListener('online',  on);
    window.addEventListener('offline', off);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  }, []);

  const load = useCallback(async (isRefresh = false) => {
    if (isRefresh) setRefreshing(true);
    // рЯФі 21.04: primary path вАФ /api/dashboard_data endpoint (live, no 10-min Sheet sync lag).
    // Fallback: Google Sheet gviz (–µ—Б–ї–Є backend —Г–њ–∞–ї).
    try {
      const bu = (typeof CHAT_BACKEND !== 'undefined') ? CHAT_BACKEND : '';
      let data = null;
      try {
        const r = await fetch(`${bu}/api/dashboard_data`, { cache: 'no-store' });
        if (r.ok) {
          const j = await r.json();
          if (Array.isArray(j.rows)) {
            data = j.rows;
          }
        }
      } catch (e) {
        console.warn('[load] /api/dashboard_data failed, trying Sheet fallback:', e?.message);
      }
      // Fallback to direct Sheet read if API didn't work
      if (!data) {
        data = await fetchSheet('Dashboard');
      }
      setRows(data);
      setError(null);
      setUpdatedAt(new Date());
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
      setRefreshing(false);
    }
    // вФАвФА DB snapshot (fast, bot-written rows visible immediately) вФАвФА
    try {
      const bu = (typeof CHAT_BACKEND !== 'undefined') ? CHAT_BACKEND : '';
      const r = await fetch(`${bu}/api/db/snapshot`, { cache: 'no-store' });
      if (r.ok) {
        const snap = await r.json();
        setDbSnapshot(snap);
      }
    } catch { /* backend offline вЖТ fall back to gviz data only */ }

    // вФАвФА Session actions (what Claude did in the current work session) вФАвФА
    try {
      const bu = (typeof CHAT_BACKEND !== 'undefined') ? CHAT_BACKEND : '';
      const r = await fetch(`${bu}/api/session_actions?limit=100`, { cache: 'no-store' });
      if (r.ok) {
        setSessionLog(await r.json());
      }
    } catch { /* backend offline вЖТ session tab will show "not available" */ }

    // вФАвФА Process activity over last 24h (counts per process + Browser Walk) вФАвФА
    try {
      const bu = (typeof CHAT_BACKEND !== 'undefined') ? CHAT_BACKEND : '';
      const r = await fetch(`${bu}/api/process_activity_24h`, { cache: 'no-store' });
      if (r.ok) {
        setActivity24h(await r.json());
      }
    } catch { /* backend offline вЖТ status rows render without 24h counts */ }
  }, []);

  useEffect(() => {
    load();
    const t = setInterval(() => load(true), REFRESH_MS);
    return () => clearInterval(t);
  }, [load]);

  const data = useMemo(() => {
    if (!rows) return null;
    const d = processRows(rows);
    // вФАвФА Override orders + refused with fresh DB snapshot when available.
    // DB is populated by bots directly (instant) and by sheets_to_db_sync (60s).
    // If backend is down, d.* stays as gviz-derived values.
    if (dbSnapshot && dbSnapshot.active) {
      d.orders = dbSnapshot.active.slice(0, 30).map(o => ({
        status:       o.status,
        date_posted:  o.posted,
        date_event:   o.event_date,
        client:       o.client,
        username:     o.username,
        contact:      o.contact,
        desc:         o.desc,
        location:     o.location,
        source_chat:  o.source_chat,
        history:      o.history,
        channel:      o.channel,
        last_activity: o.last_activity,
      }));
      // Full list of active leads вАФ for funnel stage drill-down (amoCRM-style click)
      d.allLeads = dbSnapshot.active;
      d.allArchived = dbSnapshot.archived || [];
      d.pendingDrafts = dbSnapshot.pending_drafts || [];
      d.dbSync = dbSnapshot.sync;
    }
    if (dbSnapshot && dbSnapshot.archived) {
      const total = dbSnapshot.stats?.archived || dbSnapshot.archived.length;
      d.refused = {
        total,
        recent: dbSnapshot.archived.slice(0, 10).map(o => ({
          status:  o.status,
          date:    o.last_activity || o.posted,
          name:    o.client,
          username: o.contact,
          reason:  (o.history || '').slice(-200),
        })),
      };
    }
    return d;
  }, [rows, dbSnapshot]);

  // –Я–Њ—Б–ї–µ –Ј–∞–≥—А—Г–Ј–Ї–Є attention вАФ –Ї–ї–∞—Б—Б–Є—Д–Є—Ж–Є—А—Г–µ–Љ –ї–Є–і—Л —З–µ—А–µ–Ј /api/classify_leads.
  // –Ъ—Н—И–Є—А—Г–µ–Љ –≤ aiTags, —З—В–Њ–±—Л –љ–µ –≥–Њ–љ—П—В—М Claude –Ї–∞–ґ–і—Л–є —А–∞–Ј.
  useEffect(() => {
    const items = data?.attention?.items || [];
    const usernames = [...new Set(items
      .filter(it => it.channel === 'TG' && it.username)
      .map(it => String(it.username).toLowerCase()))];
    const missing = usernames.filter(u => !(u in aiTags));
    if (!missing.length) return;
    setAiLoading(true);
    // –І–Є—В–∞–µ–Љ –Є–Ј –Ї—Н—И–∞ (attention_classify_cache.py –њ–Є—И–µ—В –Ї–∞–ґ–і—Л–µ 15 –Љ–Є–љ).
    // Cloudflare-tunnel-safe вАФ endpoint –Њ—В–≤–µ—З–∞–µ—В <100–Љ—Б, –љ–µ –Ј–∞–≤—П–Ј–∞–љ –љ–∞ Sonnet.
    const q = missing.map(encodeURIComponent).join(',');
    fetch(`${CHAT_BACKEND}/api/classifications?usernames=${q}`)
      .then(r => r.json())
      .then(j => {
        if (!j || typeof j !== 'object' || j.error) return;
        const normalized = {};
        for (const [k, v] of Object.entries(j)) normalized[k.toLowerCase()] = v;
        setAiTags(prev => ({ ...prev, ...normalized }));
      })
      .catch(() => {})
      .finally(() => setAiLoading(false));
  }, [data?.attention?.items?.length]);


  // Fast polling (30s) when scan is active
  useEffect(() => {
    if (!data || !data.scan) return;
    const active = data.scan.status === 'scanning' || data.scan.status === 'needs_permission';
    if (!active) return;
    const fast = setInterval(() => load(true), 30000);
    return () => clearInterval(fast);
  }, [data?.scan?.status, load]);

  const timeStr = updatedAt
    ? updatedAt.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' })
    : null;

  return (
    <AiTagsContext.Provider value={{ tags: aiTags, loading: aiLoading }}>
    <ChatContext.Provider value={{ openChat: setChatTarget }}>
    <div className="app">
      {/* Header */}
      <div className="header">
        <div className="header-row">
          <div className="header-brand">
            <span className="header-note">рЯОґ</span>
            <div>
              <div className="header-title">
                LCB Dashboard
                {offline && <span className="offline-pill">offline</span>}
              </div>
              {timeStr && <div className="header-sub">–Ю–±–љ–Њ–≤–ї–µ–љ–Њ: {timeStr}</div>}
              <UnreadBadge />
            </div>
          </div>
          <button
            className="refresh-btn"
            onClick={() => load(true)}
            disabled={refreshing}
          >
            <span className={refreshing ? 'spin' : ''}>вЖї</span>
          </button>
        </div>
      </div>

      {/* Error */}
      {error && (
        <div className="err-box">
          вЪ†пЄП {error}
          <small>
            –£–±–µ–і–Є—В–µ—Б—М —З—В–Њ Google Sheets –і–Њ—Б—В—Г–њ–љ–∞ –њ—Г–±–ї–Є—З–љ–Њ.<br/>
            –Ч–∞–њ—Г—Б—В–Є—В–µ: <code>python3 sync_dashboard_data.py</code>
          </small>
        </div>
      )}

      {/* Loading skeleton */}
      {loading && !rows && <SkeletonCards />}

      {/* Content */}
      {data && (
        <>
          <ConnectionStatus connection={data.connection} vkConnection={data.vkConnection} />
          <TabBar
            activeTab={activeTab}
            setActiveTab={setActiveTab}
            attentionCount={data.attention?.total || 0}
            refusalCount={Object.values(data.refusalCategories || {}).reduce((a,b) => a+b, 0)}
            paidCount={data.paid?.total || 0}
            agentsMissing={(data.agents?.missing || 0) + (data.agents?.staleSla || 0)}
            aiCalls={data.aiUsage?.totalCalls || 0}
            sessionCount={sessionLog?.total || 0}
          />

          {activeTab === 'overview' && (
            <>
              <StatusSection status={data.status} activity24h={activity24h} onProcessClick={setShowProcess} />
              <ActionButtons />
              <KPISection kpi={data.kpi} setActiveTab={setActiveTab}
                          browserWalk={data.browserWalk || {leads:0, refusals:0, chats:0, ranAt:'', hours:48, items:[]}} />
              <div className="section" style={{ marginTop: 8 }}>
                <TGLeadsButton
                  onClick={() => setShowTGModal(true)}
                  tgWeek={data.tgFunnel?.week}
                />
              </div>
              <FunnelSplitSections
                allLeads={data.allLeads || []}
                archived={data.allArchived || []}
                pendingDrafts={data.pendingDrafts || []}
                sessionLog={sessionLog || null}
              />
              <OrdersSection orders={data.orders} />
              <ScanStatus scan={data.scan} />
              <FollowupsSection followups={data.followups} />
            </>
          )}

          {activeTab === 'new' && (
            <SessionSection session={sessionLog || {total:0, items:[], counts:{}, sessions:[], session:''}} />
          )}

          {activeTab === 'attention' && (
            <AttentionSection attention={data.attention || {total:0, items:[]}} />
          )}

          {activeTab === 'paid' && (
            <PaidSection paid={data.paid || {total:0, items:[]}} />
          )}

          {activeTab === 'refusals' && (
            <>
              <AISkipSection aiSkips={data.aiSkips} />
              <RefusalsSection refused={data.refused} categories={data.refusalCategories || {}} />
            </>
          )}

          {activeTab === 'broadcasts' && (
            <BroadcastsSection categories={data.refusalCategories || {}} />
          )}

          {activeTab === 'processes' && (
            <ProcessesSection agents={data.agents || {total:0, running:0, missing:0, items:[]}} />
          )}

          {activeTab === 'timeline' && (
            <TimelineSection timeline={data.timeline || {total:0, items:[]}} />
          )}

          {activeTab === 'ai' && (
            <AIUsageSection aiUsage={data.aiUsage || {totalCalls:0, totalCost:0, skip:0, adapt:0, ok:0, services:{}}} />
          )}

          {showTGModal && (
            <TGFunnelModal
              tgFunnel={data.tgFunnel || {}}
              onClose={() => setShowTGModal(false)}
            />
          )}
          {showProcess && (
            <ProcessRulesModal
              processKey={showProcess}
              onClose={() => setShowProcess(null)}
            />
          )}
        </>
      )}
      {chatTarget && <ChatPanel target={chatTarget} onClose={() => setChatTarget(null)} />}
    </div>
    </ChatContext.Provider>
    </AiTagsContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

<script>
// Service Worker registration
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('[SW] registered', r.scope))
      .catch(e => console.log('[SW] failed', e));
  });
}
</script>
</body>
</html>
